<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excellent Gestão - Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root { --primary: #FFD600; --bg: #121212; --card: #1E1E1E; --input: #2A2A2A; --text: #fff; }
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{height:100vh;background:var(--bg);color:var(--text);overflow: hidden;}

/* ANIMAÇÃO DE BOAS-VINDAS */
#welcomeOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: none; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; }
.welcome-text { font-size: 2.5rem; font-weight: 600; opacity: 0; transform: translateY(20px); animation: fadeInUp 0.8s forwards; text-align: center;}
.welcome-text span { color: var(--primary); }
@keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
.loader-line { width: 200px; height: 3px; background: #333; margin-top: 20px; border-radius: 10px; overflow: hidden; }
.loader-line::after { content: ''; display: block; width: 100px; height: 100%; background: var(--primary); animation: loading 1.5s infinite linear; }
@keyframes loading { from { margin-left: -100px; } to { margin-left: 200px; } }

/* LOGIN & FORMS */
.login{display:flex;justify-content:center;align-items:center;height:100vh}
.card{background:var(--card);padding:25px;border-radius:12px;width:320px;box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; z-index: 10;}
input,select{width:100%;padding:10px;margin-top:10px;background:var(--input);border:1px solid transparent;color:#fff;border-radius:6px;outline: none;}
input:focus, select:focus { border-color: var(--primary); }

.btn{margin-top:15px;padding:12px;width:100%;background:var(--primary);color:#000;border:none;border-radius:8px;cursor:pointer;font-weight:bold;transition: 0.3s; display:flex; justify-content:center; align-items:center; gap:8px;}
.btn:hover{filter: brightness(1.2); transform: scale(1.02);}
.btn-red { background: #F44336; color: white; }
.btn-green { background: #4CAF50; color: white; }
.btn-dark { background: #444; color: white; }

/* APP LAYOUT */
.app{display:none;height:100vh;flex-direction: column;}
.topbar { height: 60px; background: var(--card); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; border-bottom: 1px solid #333; }
.container{display:flex;flex: 1; overflow: hidden;}

/* SIDEBAR */
.sidebar{ width:220px; background:var(--primary); padding:20px; display: flex; flex-direction: column; }
.logo-sidebar{font-size:20px;font-weight:600;color:#000;margin-bottom:30px; text-align: center;}
.menu button{width:100%;padding:12px;margin-bottom:10px;background:#000;color:#fff;border:none;border-radius:8px;cursor:pointer; text-align: left; transition: 0.3s;}
.menu button i { margin-right: 10px; }
.menu button:hover{background:#fff;color:#000}

/* AJUSTE NO BOTÃO SAIR */
.btn-sair { margin-top:auto; background: #000 !important; color: #fff !important; border: 2px solid #000 !important; }
.btn-sair:hover { background: #1a1a1a !important; border-color: #1a1a1a !important; }

.submenu{ width:260px; background:var(--card); padding:20px; border-right:1px solid #333; overflow-y: auto;}
.main{flex:1;padding:30px;overflow-y:auto; background: #161616;}

/* MODAL / POPUP CUSTOMIZADOS */
.overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index: 200; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.popup-config { background: var(--card); padding: 30px; border-radius: 15px; width: 350px; border: 1px solid var(--primary); text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.6); animation: scaleIn 0.3s ease-out; }
@keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

/* TABELAS */
.tabela-container { width: 100%; overflow-x: auto; margin-top: 20px; background: var(--card); border-radius: 8px; padding: 15px; }
.tabela { width: 100%; border-collapse: collapse; text-align: left; }
.tabela th { color: var(--primary); padding: 12px; border-bottom: 1px solid #333; font-weight: 600; }
.tabela td { padding: 12px; border-bottom: 1px solid #333; font-size: 14px; vertical-align: middle; }
.action-btn { padding: 8px 12px; border-radius: 6px; cursor: pointer; border: none; margin-right: 5px; font-size: 13px; display: inline-flex; align-items: center; justify-content: center; transition: 0.2s;}
.action-btn:hover { filter: brightness(1.2); }
.edit-btn { background: #2196F3; color: white; }
.del-btn { background: #F44336; color: white; }

/* BADGES & UTILS */
.badge { padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; border: none; outline: none; cursor:pointer;}
.andamento { background: #FFA500; color: #000; }
.finalizado { background: #4CAF50; color: #fff; }
.cancelado { background: #F44336; color: #fff; }

.status-lead { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; border: none; outline: none; cursor: pointer; text-align: center;}
.lead-potencial { background: #2196F3; color: #fff; }
.lead-quente { background: #F44336; color: #fff; }
.lead-morno { background: #FF9800; color: #fff; }
.lead-frio { background: #9E9E9E; color: #fff; }

.config-icon { font-size: 20px; cursor: pointer; color: var(--primary); transition: 0.5s; }
.config-icon:hover { transform: rotate(90deg); }
.admin-badge { background: #FFD600; color: #000; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-left: 10px; display: none;}
.status-select { padding: 5px; border-radius: 5px; font-size: 12px; font-weight: bold; border: none; cursor: pointer;}
.dashboard-chart-container { background: var(--card); border-radius: 12px; padding: 20px; margin-top: 20px; border: 1px solid #333; height: 350px;}

.input-inline { background: transparent; border: 1px solid transparent; color: #fff; border-bottom: 1px solid #555; border-radius: 0; padding: 5px; text-align: center; width: 60px; font-size: 13px; }
.input-inline:focus { border-bottom: 1px solid var(--primary); }
</style>
</head>

<body>

<div class="overlay" id="customAlertOverlay" style="z-index: 400;">
    <div class="popup-config" id="customAlertBox">
        <div id="customAlertIcon" style="font-size: 45px; margin-bottom: 15px;"></div>
        <h3 id="customAlertTitle"></h3>
        <p id="customAlertMsg" style="margin: 15px 0; font-size: 14px; color: #ccc; line-height: 1.5;"></p>
        <div id="customAlertButtons" style="display:flex; gap:10px; justify-content:center; margin-top: 20px;"></div>
    </div>
</div>

<div id="welcomeOverlay">
    <div class="welcome-text">Bem vindo(a) a <span>EXCEL</span>LENT GESTÃO</div>
    <div class="loader-line"></div>
</div>

<div class="login" id="loginScreen">
    <div class="card">
        <div style="text-align: center; margin-bottom: 25px;">
            <i class="fa-solid fa-chart-pie" style="font-size: 40px; color: var(--primary); margin-bottom: 10px;"></i>
            <h2>Acesso Restrito</h2>
        </div>
        <input id="user" placeholder="Usuário">
        <input id="pass" type="password" placeholder="Senha">
        <button class="btn" onclick="login()">Entrar</button>
        <div style="display:flex; justify-content: space-between; margin-top: 10px;">
            <button class="btn" style="background: transparent; color: #aaa; width:48%; padding:8px; font-size:12px;" onclick="abrirCadastro()">Criar conta</button>
            <button class="btn" style="background: transparent; color: #aaa; width:48%; padding:8px; font-size:12px;" onclick="abrirMudarSenha()">Mudar Senha</button>
        </div>
    </div>
</div>

<div class="login" id="cadastroScreen" style="display:none">
    <div class="card">
        <h2>Cadastro</h2>
        <input id="novoUser" placeholder="Novo Usuário">
        <input id="novaSenha" type="password" placeholder="Senha">
        
        <select id="empresaSelect" onchange="verificarNovaEmpresa()">
            <option value="">Selecione a Empresa...</option>
            <option value="NOVA_EMPRESA">+ Adicionar Nova Empresa</option>
        </select>
        <input id="empresa" placeholder="Nome da Nova Empresa" style="display:none">
        
        <button class="btn" onclick="cadastrar()">Solicitar Acesso</button>
        <button class="btn btn-dark" onclick="voltarLogin()">Voltar</button>
    </div>
</div>

<div class="login" id="mudarSenhaScreen" style="display:none">
    <div class="card">
        <h2>Alterar Senha</h2>
        <input id="msUser" placeholder="Seu Usuário">
        <input id="msOld" type="password" placeholder="Senha Antiga">
        <input id="msNew" type="password" placeholder="Nova Senha">
        <button class="btn" onclick="mudarSenhaUser()">Atualizar Senha</button>
        <button class="btn btn-dark" onclick="voltarLogin()">Voltar</button>
    </div>
</div>

<div class="overlay" id="overlayConfig">
    <div class="popup-config">
        <h3 id="adminTitle">Autenticação Admin</h3>
        <p style="font-size: 12px; color: #aaa; margin-top: 5px; margin-bottom: 15px;">Insira a senha master da sua empresa para liberar edições.</p>
        <div id="adminForm">
            <input id="adminPass" type="password" placeholder="Senha Administrativa">
            <button class="btn" onclick="authAdmin()">Liberar Edição</button>
        </div>
        <button class="btn btn-red" onclick="fecharConfig()" style="margin-top: 10px;">Cancelar</button>
    </div>
</div>

<div class="app" id="app">
    <div class="topbar">
        <div style="display:flex; align-items: center;">
            <span style="font-weight: 600; letter-spacing: 1px;">EXCELLENT <span id="adminTag" class="admin-badge">MODO EDIÇÃO / ADMIN</span></span>
        </div>
        <i class="fa-solid fa-gear config-icon" onclick="abrirConfig()" title="Configurações / Liberação"></i>
    </div>
    
    <div class="container">
        <div class="sidebar">
            <div class="logo-sidebar">MENU</div>
            <div class="menu" style="display: flex; flex-direction: column; height: 100%;">
                <button onclick="mostrar('dashboard')"><i class="fa-solid fa-chart-line"></i> Dashboard</button>
                <button onclick="mostrar('clientes')"><i class="fa-solid fa-users"></i> Clientes</button>
                <button onclick="mostrar('vendas')"><i class="fa-solid fa-cart-shopping"></i> Vendas</button>
                <button onclick="mostrar('processos')"><i class="fa-solid fa-tasks"></i> Processos</button>
                <button onclick="mostrar('finalizados')"><i class="fa-solid fa-flag-checkered"></i> Finalizados</button>
                <button onclick="mostrar('credito')"><i class="fa-solid fa-hand-holding-dollar"></i> Crédito</button>
                
                <button id="btnUsuarios" onclick="mostrar('usuarios')" style="display:none; background: #000; color: #fff; font-weight:bold; margin-top: 15px;">
                    <i class="fa-solid fa-user-shield" style="color:var(--primary)"></i> Desenvolvedor
                </button>

                <button onclick="location.reload()" class="btn-sair"><i class="fa-solid fa-door-open"></i> Sair</button>
            </div>
        </div>
        <div class="submenu" id="submenu"></div>
        <div class="main" id="conteudo"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, get, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC7vXTO8JQxBEu5ejxD4MNOscfbfgxgmp0",
        authDomain: "excellentgestao-e3136.firebaseapp.com",
        databaseURL: "https://excellentgestao-e3136-default-rtdb.firebaseio.com",
        projectId: "excellentgestao-e3136",
        storageBucket: "excellentgestao-e3136.firebasestorage.app",
        messagingSenderId: "544280332279",
        appId: "1:544280332279:web:9e5feeb04ad6490b8490f2"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const db = getDatabase(firebaseApp);

    let usuarios = {};
    let empresasConfigs = {};
    let dadosGlobal = { clientes: [], vendas: [], processos: [], finalizados: [] };
    let chave = ''; 
    let isAdminMode = false;
    let usuarioLogado = ''; 
    let telaAtual = 'dashboard';
    let chartInstance = null;
    
    let editClienteIndex = -1;
    let editVendaIndex = -1;
    let editProcessoIndex = -1;
    let editFinalizadoIndex = -1;

    // Variáveis Globais de Filtro do Dashboard
    window.dashMesAtual = 'ALL';
    window.dashAnoAtual = new Date().getFullYear().toString();

    // --- SISTEMA DE ALERTAS CUSTOMIZADOS ---
    window.uiAlerta = (msg, tipo = 'aviso') => {
        const overlay = document.getElementById('customAlertOverlay');
        const box = document.getElementById('customAlertBox');
        const title = document.getElementById('customAlertTitle');
        const icon = document.getElementById('customAlertIcon');
        const p = document.getElementById('customAlertMsg');
        const btns = document.getElementById('customAlertButtons');

        let cor = '#FFD600'; let icone = 'fa-triangle-exclamation'; let titulo = 'Atenção'; let txtColor = '#000';
        if(tipo === 'erro') { cor = '#F44336'; icone = 'fa-circle-xmark'; titulo = 'Erro'; txtColor = '#fff'; }
        if(tipo === 'sucesso') { cor = '#4CAF50'; icone = 'fa-circle-check'; titulo = 'Sucesso'; txtColor = '#fff'; }
        if(tipo === 'bloqueio') { cor = '#F44336'; icone = 'fa-lock'; titulo = 'Acesso Negado'; txtColor = '#fff'; }

        icon.innerHTML = `<i class="fa-solid ${icone}" style="color: ${cor}"></i>`;
        title.style.color = cor;
        title.innerText = titulo;
        p.innerText = msg;
        box.style.borderColor = cor;

        btns.innerHTML = `<button class="btn" style="background:${cor}; color:${txtColor};" onclick="document.getElementById('customAlertOverlay').style.display='none'">OK</button>`;
        overlay.style.display = 'flex';
    };

    window.uiConfirmar = (msg, callback) => {
        const overlay = document.getElementById('customAlertOverlay');
        const title = document.getElementById('customAlertTitle');
        const icon = document.getElementById('customAlertIcon');
        const p = document.getElementById('customAlertMsg');
        const btns = document.getElementById('customAlertButtons');

        icon.innerHTML = `<i class="fa-solid fa-circle-question" style="color: #2196F3"></i>`;
        title.style.color = '#2196F3';
        title.innerText = 'Confirmação';
        p.innerText = msg;
        document.getElementById('customAlertBox').style.borderColor = '#2196F3';

        btns.innerHTML = `
            <button class="btn btn-red" style="width: 100px;" onclick="document.getElementById('customAlertOverlay').style.display='none'">Cancelar</button>
            <button class="btn" style="width: 100px; background: #2196F3; color: white;" id="btnConfirmaAcao">Sim</button>
        `;
        
        document.getElementById('btnConfirmaAcao').onclick = () => {
            overlay.style.display = 'none';
            callback();
        };
        overlay.style.display = 'flex';
    };


    // Leituras Firebase
    onValue(ref(db, 'usuarios'), (snapshot) => { 
        usuarios = snapshot.val() || {}; 
        atualizarSelectEmpresas();
        if(telaAtual === 'usuarios') mostrar('usuarios');
    });

    onValue(ref(db, 'empresas'), (snapshot) => {
        empresasConfigs = snapshot.val() || {};
        atualizarSelectEmpresas();
        if(telaAtual === 'usuarios') mostrar('usuarios');
    });

    function atualizarSelectEmpresas() {
        const select = document.getElementById('empresaSelect');
        if(!select) return;
        
        let empresasUnicas = Object.keys(empresasConfigs);
        Object.values(usuarios).forEach(u => {
            if(u.empresa && !empresasUnicas.includes(u.empresa)) empresasUnicas.push(u.empresa);
        });

        let html = `<option value="">Selecione a Empresa...</option>`;
        empresasUnicas.forEach(emp => {
            html += `<option value="${emp}">${emp}</option>`;
        });
        html += `<option value="NOVA_EMPRESA">+ Adicionar Nova Empresa</option>`;
        select.innerHTML = html;
    }

    // --- LOGIN E SENHA ---
    window.login = () => {
        const u = document.getElementById('user').value.trim();
        const p = document.getElementById('pass').value;

        if (u === 'DESENVOLVEDOR' && p === '1709') {
            chave = 'admin_desenvolvedor';
            usuarioLogado = 'DESENVOLVEDOR';
            document.getElementById('btnUsuarios').style.display = 'block';
            iniciarApp();
            return;
        }

        if (usuarios[u] && usuarios[u].senha === p) {
            let status = usuarios[u].statusAcesso || 'pendente';
            
            if (status !== 'permitido') {
                let msg = status === 'pendente' 
                    ? "Seu cadastro está em análise. Aguarde a liberação do desenvolvedor." 
                    : "Seu acesso foi revogado pelo administrador.";
                uiAlerta(msg, 'bloqueio');
                return;
            }

            chave = usuarios[u].empresa.replace(/\s+/g, '_').toLowerCase();
            usuarioLogado = u;
            document.getElementById('btnUsuarios').style.display = 'none';
            iniciarApp();
        } else { 
            uiAlerta('Usuário ou senha incorretos!', 'erro'); 
        }
    };

    function iniciarApp() {
        document.getElementById('loginScreen').style.display = 'none';
        const overlay = document.getElementById('welcomeOverlay');
        overlay.style.display = 'flex';
        
        setTimeout(() => {
            overlay.style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            conectarDados();
        }, 2000);
    }

    function conectarDados() {
        if(chave === 'admin_desenvolvedor') {
            dadosGlobal = { clientes: [], vendas: [], processos: [], finalizados: [] };
            mostrar('usuarios'); 
            return;
        }

        onValue(ref(db, 'dados/' + chave), (snapshot) => {
            dadosGlobal = snapshot.val() || { clientes: [], vendas: [], processos: [], finalizados: [] };
            if(!dadosGlobal.clientes) dadosGlobal.clientes = [];
            if(!dadosGlobal.vendas) dadosGlobal.vendas = [];
            if(!dadosGlobal.processos) dadosGlobal.processos = [];
            if(!dadosGlobal.finalizados) dadosGlobal.finalizados = [];
            mostrar(telaAtual);
        });
    }

    window.mudarSenhaUser = () => {
        const u = document.getElementById('msUser').value.trim();
        const oldP = document.getElementById('msOld').value;
        const newP = document.getElementById('msNew').value;

        if(!u || !oldP || !newP) return uiAlerta('Preencha todos os campos.', 'aviso');

        get(ref(db, `usuarios/${u}`)).then((snapshot) => {
            if(snapshot.exists() && snapshot.val().senha === oldP) {
                set(ref(db, `usuarios/${u}/senha`), newP).then(() => {
                    uiAlerta('Sua senha foi atualizada com sucesso!', 'sucesso');
                    voltarLogin();
                });
            } else {
                uiAlerta('Usuário ou senha antiga incorretos.', 'erro');
            }
        });
    };

    // --- CONFIGURAÇÕES & ADMIN ---
    window.abrirConfig = () => {
        if (usuarioLogado === 'DESENVOLVEDOR') {
            isAdminMode = !isAdminMode;
            document.getElementById('adminTag').style.display = isAdminMode ? 'inline-block' : 'none';
            mostrar(telaAtual); 
            return;
        }

        if (isAdminMode) {
            isAdminMode = false;
            document.getElementById('adminTag').style.display = 'none';
            mostrar(telaAtual);
            return;
        }
        
        document.getElementById('adminPass').value = '';
        document.getElementById('overlayConfig').style.display = 'flex';
    };

    window.fecharConfig = () => { document.getElementById('overlayConfig').style.display = 'none'; };

    window.authAdmin = () => {
        const p = document.getElementById('adminPass').value;
        const nomeEmpresa = usuarios[usuarioLogado].empresa;
        const senhaCorreta = empresasConfigs[nomeEmpresa] ? empresasConfigs[nomeEmpresa].senhaAdmin : 'admin123'; 
        
        if (p === senhaCorreta) {
            isAdminMode = true;
            document.getElementById('adminTag').style.display = 'inline-block';
            fecharConfig();
            mostrar(telaAtual);
        } else { 
            uiAlerta('Senha de liberação incorreta!', 'erro'); 
        }
    };

    // --- CLIENTES ---
    window.salvarCliente = () => {
        const n = document.getElementById('nome').value;
        const c = document.getElementById('cel').value;
        const d = document.getElementById('doc').value;
        if(!n || !c) return uiAlerta("Nome e Telefone são obrigatórios.", "aviso");

        if(editClienteIndex > -1) {
            dadosGlobal.clientes[editClienteIndex] = {...dadosGlobal.clientes[editClienteIndex], nome:n, cel:c, doc:d};
            editClienteIndex = -1;
            uiAlerta("Cliente atualizado com sucesso!", "sucesso");
        } else {
            dadosGlobal.clientes.push({nome:n, cel:c, doc:d, statusLead: ''});
            uiAlerta("Cliente salvo com sucesso!", "sucesso");
        }
        
        set(ref(db, 'dados/' + chave), dadosGlobal);
        mostrar('clientes');
    };

    window.editarCliente = (i) => {
        const cli = dadosGlobal.clientes[i];
        document.getElementById('nome').value = cli.nome;
        document.getElementById('cel').value = cli.cel;
        document.getElementById('doc').value = cli.doc;
        editClienteIndex = i;
        document.querySelector('.submenu .btn').innerHTML = '<i class="fa-solid fa-arrows-rotate"></i> Atualizar Cliente';
    };

    window.excluirCliente = (i) => {
        uiConfirmar("Deseja realmente excluir este cliente permanentemente?", () => {
            dadosGlobal.clientes.splice(i, 1);
            set(ref(db, 'dados/' + chave), dadosGlobal);
        });
    };

    window.mudarStatusCliente = (i, status) => {
        dadosGlobal.clientes[i].statusLead = status;
        set(ref(db, 'dados/' + chave), dadosGlobal);
    };

    // --- VENDAS, PROCESSOS & EXCLUSAO GENERICA ---
    window.hojeInput = () => {
        const hj = new Date();
        return hj.toISOString().split('T')[0];
    }

    window.calcularDataFim = (dataInicioStr, dias) => {
        if(!dataInicioStr || !dias) return '';
        let d = new Date(dataInicioStr + "T12:00:00"); 
        d.setDate(d.getDate() + parseInt(dias));
        return d.toISOString().split('T')[0];
    }

    window.salvarVenda = () => {
        const cli = document.getElementById('clienteSel').value;
        if(!cli) return uiAlerta("Por favor, selecione um cliente.", "aviso");

        let v = {
            cliente: cli,
            cpf: document.getElementById('cpf').value,
            dataVenda: document.getElementById('dataVenda').value,
            valor: document.getElementById('valor').value,
            entrada: document.getElementById('entrada').value,
            tipo: document.getElementById('tipo').value,
            status: document.getElementById('status').value,
            etapa: document.getElementById('etapa').value,
            taxa: document.getElementById('taxa')?.value || '',
            parcelas: document.getElementById('parcelas')?.value || '',
            restante: document.getElementById('restante')?.value || '',
            data: document.getElementById('data')?.value || ''
        };

        if (editVendaIndex > -1) {
            dadosGlobal.vendas[editVendaIndex] = v;

    window.renderDashboardChart = (todasVendasFiltradas) => {
        const ctx = document.getElementById('vendasChart');
        if(!ctx) return;
        
        if(chartInstance) chartInstance.destroy();

        let faturamentoPorData = {};
        todasVendasFiltradas.forEach(v => {
            let data = v.dataVenda || 'Sem Data';
            let valorNum = parseFloat(v.valor.replace(/\D/g, '')) / 100 || 0;
            
            if(!faturamentoPorData[data]) faturamentoPorData[data] = 0;
            faturamentoPorData[data] += valorNum;
        });

        let datasOrdenadas = Object.keys(faturamentoPorData).sort();
        let valores = datasOrdenadas.map(d => faturamentoPorData[d]);

        let labelsFormatadas = datasOrdenadas.map(d => {
            if(d === 'Sem Data') return d;
            let parts = d.split('-');
            if(parts.length === 3) return `${parts[2]}/${parts[1]}`;
            return d;
        });

        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labelsFormatadas,
                datasets: [{
                    label: 'Faturamento Bruto',
                    data: valores,
                    borderColor: '#FFD600',
                    backgroundColor: 'rgba(255, 214, 0, 0.15)',
                    borderWidth: 3,
                    pointBackgroundColor: '#FFD600',
                    pointBorderColor: '#1E1E1E',
                    pointRadius: 5,
                    pointHoverRadius: 7,
                    fill: true,
                    tension: 0.4 
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                color: '#aaa',
                plugins: {
                    legend: { labels: { color: '#fff', font: { family: 'Poppins' } } },
                    tooltip: {
                        backgroundColor: '#000',
                        titleFont: { family: 'Poppins' },
                        bodyFont: { family: 'Poppins' },
                        callbacks: {
                            label: function(context) {
                                let value = context.parsed.y;
                                return ' R$ ' + value.toLocaleString('pt-BR', {minimumFractionDigits: 2});
                            }
                        }
                    }
                },
                scales: {
                    x: { grid: { color: '#333' }, ticks: { color: '#aaa', font: { family: 'Poppins' } } },
                    y: { 
                        grid: { color: '#333' }, 
                        ticks: { 
                            color: '#aaa', 
                            font: { family: 'Poppins' },
                            callback: function(value) { return 'R$ ' + value.toLocaleString('pt-BR'); }

                        <option value="Débito">Débito</option>
                    </select>
                    <div id="extra"></div>
                    <button class="btn" onclick="salvarEdicaoProcesso()"><i class="fa-solid fa-floppy-disk"></i> Salvar Edição</button>
                </div>
            `;

            let procOrdenados = dadosGlobal.processos.map((p, idx) => ({...p, originalIdx: idx}));
            procOrdenados.sort((a, b) => new Date(a.dataVenda) - new Date(b.dataVenda));

            conteudo.innerHTML = `<h2>Processos Ativos</h2>
                <div class="tabela-container">
                    <table class="tabela">
                        <thead><tr><th>Data Venda</th><th>Cliente</th><th>Data Início</th><th>Dias</th><th>Data Fim</th><th>Tipo</th><th>Status</th>${isAdminMode ? '<th style="text-align:right;">Ações</th>' : ''}</tr></thead>
                        <tbody>
                            ${procOrdenados.map((p) => {
                                let cls = p.statusProcesso === 'Em andamento' ? 'andamento' : (p.statusProcesso === 'Finalizado' ? 'finalizado' : 'cancelado');
                                let dExibicao = p.dataVenda ? p.dataVenda.split('-').reverse().join('/') : '-';
                                let dFimExibicao = p.dataFim ? p.dataFim.split('-').reverse().join('/') : '---';
                                let dInicExibicao = p.dataInicio ? p.dataInicio.split('-').reverse().join('/') : '-';
                                
                                return `<tr>
                                    <td style="color:#aaa; font-size:12px;">${dExibicao}</td>
                                    <td><strong>${p.cliente}</strong><br><span style="color:var(--primary); font-size:12px;">${p.valor}</span></td>
                                    <td style="font-size:13px;">${dInicExibicao}</td>
                                    <td><input type="number" class="input-inline" value="${p.dias||''}" placeholder="Ex: 3" onchange="window.atualizarDiasProcesso(${p.originalIdx}, this.value)"></td>
                                    <td style="font-size:13px; color:#2196F3; font-weight:bold;">${dFimExibicao}</td>
                                    <td>
                                        <select class="badge" style="background:#222; color:#fff;" onchange="window.mudarTipoProcesso(${p.originalIdx}, this.value)">
                                            <option value="Ajuste" ${p.tipoProcesso==='Ajuste'?'selected':''}>Ajuste</option>
                                            <option value="Suporte" ${p.tipoProcesso==='Suporte'?'selected':''}>Suporte</option>
                                        </select>
                                    </td>
                                    <td>
                                        <select class="badge ${cls}" onchange="window.mudarStatusProcesso(${p.originalIdx}, this.value)">
                                            <option value="Em andamento" style="background:#333; color:#fff;" ${p.statusProcesso==='Em andamento'?'selected':''}>Em andamento</option>
                                            <option value="Finalizado" style="background:#333; color:#fff;" ${p.statusProcesso==='Finalizado'?'selected':''}>Finalizado (Mover)</option>
                                            <option value="Cancelado" style="background:#333; color:#fff;" ${p.statusProcesso==='Cancelado'?'selected':''}>Cancelado</option>
                                        </select>
                                    </td>
                                    ${isAdminMode ? `
                                    <td style="text-align:right;">
                                        <button class="action-btn edit-btn" onclick="editarProcesso(${p.originalIdx})"><i class="fa-solid fa-pen"></i></button>
                                        <button class="action-btn del-btn" onclick="window.excluirGenerico('processos', ${p.originalIdx})"><i class="fa-solid fa-trash"></i></button>
                                    </td>` : ''}
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>`;
        }

        if(tela === 'finalizados') {
            editFinalizadoIndex = -1;
            let options = dadosGlobal.clientes.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('');
            
            submenu.innerHTML = `
                <div id="formEdicaoFinalizado">
                    <h3>Editar Registro Finalizado</h3>
                    <input id="dataVenda" type="date">
                    <select id="clienteSel" onchange="window.autoCPF()">
                        <option value="">Selecionar Cliente</option>${options}
                    </select>
                    <input id="cpf" placeholder="CPF/CNPJ" readonly style="background:#222;">
                    <input id="valor" placeholder="Valor Total" oninput="window.mascaraMoeda(this); window.calcularRestante()">
                    <input id="entrada" placeholder="Valor Entrada" oninput="window.mascaraMoeda(this); window.calcularRestante()">
                    <select id="tipo" onchange="window.verCredito()">
                        <option value="Pix" selected>Pix</option>
                        <option value="Crédito">Crédito</option>
                        <option value="Débito">Débito</option>
                    </select>
                    <div id="extra"></div>
                    <button class="btn" onclick="salvarEdicaoFinalizado()"><i class="fa-solid fa-floppy-disk"></i> Salvar Edição</button>
                </div>
            `;

            let finOrdenados = dadosGlobal.finalizados.map((f, idx) => ({...f, originalIdx: idx}));
            finOrdenados.sort((a, b) => new Date(b.dataVenda) - new Date(a.dataVenda)); // Mais recentes primeiro

            conteudo.innerHTML = `<h2>Trabalhos Finalizados</h2>
                <div class="tabela-container">
                    <table class="tabela">
                        <thead><tr><th>Data Venda</th><th>Cliente</th><th>Valor</th><th>Data Fim</th><th>Tipo</th><th>Status</th>${isAdminMode ? '<th style="text-align:right;">Ações</th>' : ''}</tr></thead>
                        <tbody>
                            ${finOrdenados.map((f) => {
                                let dExibicao = f.dataVenda ? f.dataVenda.split('-').reverse().join('/') : '-';
                                let dFimExibicao = f.dataFim ? f.dataFim.split('-').reverse().join('/') : '---';
                                
                                return `<tr>
                                    <td style="color:#aaa; font-size:12px;">${dExibicao}</td>
                                    <td><strong>${f.cliente}</strong></td>
                                    <td style="color:var(--primary); font-weight:bold;">${f.valor}</td>
                                    <td style="font-size:13px; color:#4CAF50;">${dFimExibicao}</td>
                                    <td><span class="badge" style="background:#222; color:#fff;">${f.tipoProcesso}</span></td>
                                    <td><span class="badge finalizado">Finalizado</span></td>
                                    ${isAdminMode ? `
                                    <td style="text-align:right;">
                                        <button class="action-btn edit-btn" onclick="editarFinalizado(${f.originalIdx})"><i class="fa-solid fa-pen"></i></button>
                                        <button class="action-btn del-btn" onclick="window.excluirGenerico('finalizados', ${f.originalIdx})"><i class="fa-solid fa-trash"></i></button>
                                    </td>` : ''}
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>`;
        }

        if(tela === 'dashboard') {
            // Combina todas as vendas, processos e finalizados
            let todasAsVendas = [
                ...(dadosGlobal.vendas || []),
                ...(dadosGlobal.processos || []),
                ...(dadosGlobal.finalizados || [])
            ];

            // Montar Options do Filtro
            let optMeses = `<option value="ALL">Todos os Meses</option>`;
            for(let m=1; m<=12; m++) {
                let mStr = m.toString().padStart(2, '0');
                optMeses += `<option value="${mStr}" ${window.dashMesAtual === mStr ? 'selected' : ''}>${mStr}</option>`;
            }

            let anosUnicos = ['2024','2025','2026','2027'];
            todasAsVendas.forEach(v => {
                if(v.dataVenda) {
                    let a = v.dataVenda.split('-')[0];
                    if(!anosUnicos.includes(a)) anosUnicos.push(a);
                }
            });
            let optAnos = `<option value="ALL">Todos os Anos</option>`;
            anosUnicos.sort().forEach(a => {
                optAnos += `<option value="${a}" ${window.dashAnoAtual === a ? 'selected' : ''}>${a}</option>`;
            });

            submenu.innerHTML = `
                <h3>Resumo Geral</h3>
                <p style="color:#aaa; font-size:13px; margin-bottom:20px;">Métricas e acompanhamento de receita.</p>
                
                <div style="margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom:15px;">
                    <h4 style="font-size:13px; margin-bottom:5px;">Filtro do Gráfico</h4>
                    <select onchange="window.setDashFiltro('mes', this.value)" style="margin-bottom:5px;">${optMeses}</select>
                    <select onchange="window.setDashFiltro('ano', this.value)">${optAnos}</select>
                </div>

                <div class="card" style="width: 100%; text-align: center; margin-bottom: 15px; padding:15px; box-shadow:none; border:1px solid #333;">
                    <h4 style="color: #aaa; font-weight:400; font-size:14px;">Total Clientes</h4>
                    <p style="font-size: 28px; font-weight: bold; color:var(--text);">${dadosGlobal.clientes.length}</p>
                </div>
                <div class="card" style="width: 100%; text-align: center; padding:15px; box-shadow:none; border:1px solid #333;">
                    <h4 style="color: #aaa; font-weight:400; font-size:14px;">Total Vendas Lançadas</h4>
                    <p style="font-size: 28px; font-weight: bold; color:var(--text);">${todasAsVendas.length}</p>
                </div>
            `;
            
            // Aplica filtro e calcula
            let vendasFiltradas = todasAsVendas.filter(v => {
                if(v.status === 'Cancelado' || v.statusProcesso === 'Cancelado') return false;
                
                let anoVenda = v.dataVenda ? v.dataVenda.split('-')[0] : '';
                let mesVenda = v.dataVenda ? v.dataVenda.split('-')[1] : '';
                
                let passaMes = (window.dashMesAtual === 'ALL') || (mesVenda === window.dashMesAtual);
                let passaAno = (window.dashAnoAtual === 'ALL') || (anoVenda === window.dashAnoAtual);
                
                return passaMes && passaAno;
            });

            let faturamentoFiltrado = 0;
            vendasFiltradas.forEach(v => {
                faturamentoFiltrado += parseFloat(v.valor.replace(/\D/g, '')) / 100 || 0;
            });

            // Total Geral Ignorando Filtro de Datas (Para manter como requisitado)
            let faturamentoTotalGeral = 0;
            todasAsVendas.forEach(v => {
                if(v.status !== 'Cancelado' && v.statusProcesso !== 'Cancelado') {
                    faturamentoTotalGeral += parseFloat(v.valor.replace(/\D/g, '')) / 100 || 0;
                }
            });

            conteudo.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                    <h2>Dashboard de Receitas</h2>
                    <div style="text-align:right;">
                        <span style="font-size:12px; color:#aaa;">Faturamento (No Filtro)</span><br>
                        <strong style="font-size:24px; color:var(--primary);">R$ ${faturamentoFiltrado.toLocaleString('pt-BR', {minimumFractionDigits:2})}</strong>
                    </div>
                </div>
                <div style="text-align:right; margin-top:5px;">
                    <span style="font-size:11px; color:#666;">Total Geral de Tudo: R$ ${faturamentoTotalGeral.toLocaleString('pt-BR', {minimumFractionDigits:2})}</span>
                </div>
                
                <div class="dashboard-chart-container">
                    <canvas id="vendasChart"></canvas>
                </div>
            `;
            
            setTimeout(() => window.renderDashboardChart(vendasFiltradas), 50);
        }

        if(tela === 'credito') {
            submenu.innerHTML = `<h3>Créditos</h3><p style="color:#aaa; font-size:13px;">Gestão de parcelamentos.</p>`;
            
            // Busca em todas as arrays e mapeia a origem
            let c1 = (dadosGlobal.vendas || []).map((v, i) => ({...v, originalIdx: i, origem: 'vendas'})).filter(v => v.tipo === 'Crédito');
            let c2 = (dadosGlobal.processos || []).map((v, i) => ({...v, originalIdx: i, origem: 'processos'})).filter(v => v.tipo === 'Crédito');
            let c3 = (dadosGlobal.finalizados || []).map((v, i) => ({...v, originalIdx: i, origem: 'finalizados'})).filter(v => v.tipo === 'Crédito');
            
            let vCredito = [...c1, ...c2, ...c3];

            conteudo.innerHTML = `<h2>Controle de Parcelas</h2>
                <div class="tabela-container">
                    <table class="tabela">
                        <thead><tr><th>Fase Atual</th><th>Cliente</th><th>Total</th><th>Restante</th><th>Parcelas</th><th>Vencimento</th>${isAdminMode ? '<th style="text-align:right;">Ações</th>' : ''}</tr></thead>
                        <tbody>
                            ${vCredito.map(v => `<tr>
                                <td><span class="badge" style="background:#222; color:#aaa; font-weight:normal;">${v.origem.toUpperCase()}</span></td>
                                <td><strong>${v.cliente}</strong></td>
                                <td style="color:#aaa;">${v.valor}</td>
                                <td style="color:#F44336; font-weight:bold;">${v.restante}</td>
                                <td>${v.parcelas}x</td>
                                <td><span class="badge" style="background:#222; color:var(--primary);">${v.data ? v.data.split('-').reverse().join('/') : '-'}</span></td>
                                ${isAdminMode ? `
                                <td style="text-align:right;">
                                    <button class="action-btn edit-btn" onclick="mostrar('${v.origem}'); setTimeout(()=> window['editar${v.origem.charAt(0).toUpperCase() + v.origem.slice(1).replace('s', v.origem==='vendas'?'a':'o')}'](${v.originalIdx}), 100)" title="Editar na aba de origem"><i class="fa-solid fa-pen"></i></button>
                                    <button class="action-btn del-btn" onclick="window.excluirGenerico('${v.origem}', ${v.originalIdx})" title="Excluir Registro"><i class="fa-solid fa-trash"></i></button>
                                </td>` : ''}
                            </tr>`).join('')}
                        </tbody>
                    </table>
                </div>`;
        }
    };

    // --- UTILITÁRIOS & CADASTRO E TELAS LOGIN ---
    window.autoCPF = () => {
        let c = dadosGlobal.clientes.find(x => x.nome === document.getElementById('clienteSel').value);
        document.getElementById('cpf').value = c ? c.doc : '';
    };

    window.verCredito = () => {
        let extra = document.getElementById('extra');
        if(document.getElementById('tipo').value === 'Crédito') {
            extra.innerHTML = `
                <input id="taxa" placeholder="Taxa/Juros (R$)" oninput="window.mascaraMoeda(this); window.calcularRestante()">
                <div style="display:flex; gap:10px;">
                    <input id="parcelas" placeholder="Qtd Parc." type="number" style="width:40%;">
                    <input id="data" type="date" style="width:60%;" title="Data do 1º Vencimento">
                </div>
                <input id="restante" placeholder="Resta Pagar" readonly style="background:#222; color:#F44336; font-weight:bold;">
                `;
        } else { extra.innerHTML = ''; }
    };

    window.mascaraDoc = (i) => {
        let v = i.value.replace(/\D/g, "");
        if(v.length <= 11) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4");
        else v = v.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, "$1.$2.$3/$4-$5");
        i.value = v;
    };

    window.mascaraMoeda = (i) => {
        let v = i.value.replace(/\D/g, '');
        v = (v/100).toFixed(2).replace(".", ",");
        i.value = "R$ " + v.replace(/(\d)(?=(\d{3})+(?!\d))/g, "$1.");
    };

    window.calcularRestante = () => {
        let val = parseFloat(document.getElementById('valor').value.replace(/\D/g, ''))/100 || 0;
        let ent = parseFloat(document.getElementById('entrada').value.replace(/\D/g, ''))/100 || 0;
        let tax = parseFloat(document.getElementById('taxa')?.value.replace(/\D/g, '') || 0)/100 || 0;
        let rest = (val - ent) + tax;
        if(document.getElementById('restante')) 
            document.getElementById('restante').value = "R$ " + rest.toLocaleString('pt-BR', {minimumFractionDigits: 2});
    };

    window.abrirCadastro = () => {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mudarSenhaScreen').style.display = 'none';
        document.getElementById('cadastroScreen').style.display = 'flex';
    };

    window.abrirMudarSenha = () => {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('cadastroScreen').style.display = 'none';
        document.getElementById('mudarSenhaScreen').style.display = 'flex';
    }

    window.voltarLogin = () => {
        document.getElementById('cadastroScreen').style.display = 'none';
        document.getElementById('mudarSenhaScreen').style.display = 'none';
        document.getElementById('loginScreen').style.display = 'flex';
        
        document.getElementById('novoUser').value = '';
        document.getElementById('novaSenha').value = '';
        document.getElementById('empresaSelect').value = '';
        document.getElementById('empresa').value = '';
        document.getElementById('empresa').style.display = 'none';
        
        document.getElementById('msUser').value = '';
        document.getElementById('msOld').value = '';
        document.getElementById('msNew').value = '';
    };

    window.verificarNovaEmpresa = () => {
        const sel = document.getElementById('empresaSelect').value;
        document.getElementById('empresa').style.display = sel === 'NOVA_EMPRESA' ? 'block' : 'none';
    };

    window.cadastrar = () => {
        const u = document.getElementById('novoUser').value.trim();
        const p = document.getElementById('novaSenha').value;
        const selEmpresa = document.getElementById('empresaSelect').value;
        let nomeEmpresa = selEmpresa;

        if (selEmpresa === 'NOVA_EMPRESA') {
            nomeEmpresa = document.getElementById('empresa').value.trim();
        }

        if(!u || !p || !nomeEmpresa) return uiAlerta("Preencha todos os campos corretamente para solicitar acesso.", "aviso");
        
        if(usuarios[u]) {
            return uiAlerta(`O usuário "${u}" já existe. Escolha outro identificador.`, "erro");
        }

        set(ref(db, 'usuarios/' + u), {
            senha: p,
            empresa: nomeEmpresa,
            statusAcesso: 'pendente' 
        }).then(() => {
            uiAlerta("Sua solicitação foi enviada! Aguarde a aprovação do Administrador.", "sucesso");
            voltarLogin(); 
        });
    };

</script>
</body>
</html>
