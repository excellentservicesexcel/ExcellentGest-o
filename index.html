<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excellent Gestão - Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root { --primary: #FFD600; --bg: #121212; --card: #1E1E1E; --input: #2A2A2A; --text: #fff; }
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{height:100vh;background:var(--bg);color:var(--text);overflow: hidden;}

/* ANIMAÇÃO DE BOAS-VINDAS */
#welcomeOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: none; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; }
.welcome-text { font-size: 2.5rem; font-weight: 600; opacity: 0; transform: translateY(20px); animation: fadeInUp 0.8s forwards; text-align: center;}
.welcome-text span { color: var(--primary); }
@keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
.loader-line { width: 200px; height: 3px; background: #333; margin-top: 20px; border-radius: 10px; overflow: hidden; }
.loader-line::after { content: ''; display: block; width: 100px; height: 100%; background: var(--primary); animation: loading 1.5s infinite linear; }
@keyframes loading { from { margin-left: -100px; } to { margin-left: 200px; } }

/* LOGIN & FORMS */
.login{display:flex;justify-content:center;align-items:center;height:100vh}
.card{background:var(--card);padding:25px;border-radius:12px;width:320px;box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; z-index: 10;}
input,select,textarea{width:100%;padding:10px;margin-top:10px;background:var(--input);border:1px solid transparent;color:#fff;border-radius:6px;outline: none;}
input:focus, select:focus, textarea:focus { border-color: var(--primary); }

/* Ajuste cirúrgico para ícones de data/hora ficarem brancos */
input[type="date"]::-webkit-calendar-picker-indicator,
input[type="time"]::-webkit-calendar-picker-indicator {
    filter: invert(1);
    cursor: pointer;
}

.btn{margin-top:15px;padding:12px;width:100%;background:var(--primary);color:#000;border:none;border-radius:8px;cursor:pointer;font-weight:bold;transition: 0.3s; display:flex; justify-content:center; align-items:center; gap:8px;}
.btn:hover{filter: brightness(1.2); transform: scale(1.02);}
.btn-red { background: #F44336; color: white; }
.btn-green { background: #4CAF50; color: white; }
.btn-dark { background: #444; color: white; }

/* APP LAYOUT */
.app{display:none;height:100vh;flex-direction: column;}
.topbar { height: 60px; background: var(--card); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; border-bottom: 1px solid #333; }
.container{display:flex;flex: 1; overflow: hidden;}

/* SIDEBAR */
.sidebar{ width:220px; background:var(--primary); padding:20px; display: flex; flex-direction: column; }
.logo-sidebar{font-size:20px;font-weight:600;color:#000;margin-bottom:30px; text-align: center;}
.menu button{width:100%;padding:12px;margin-bottom:10px;background:#000;color:#fff;border:none;border-radius:8px;cursor:pointer; text-align: left; transition: 0.3s;}
.menu button i { margin-right: 10px; }
.menu button:hover{background:#fff;color:#000}

.btn-sair { margin-top:auto; background: #000 !important; color: #fff !important; border: 2px solid #000 !important; }
.btn-sair:hover { background: #1a1a1a !important; border-color: #1a1a1a !important; }

.submenu{ width:260px; background:var(--card); padding:20px; border-right:1px solid #333; overflow-y: auto;}
.main{flex:1;padding:30px;overflow-y:auto; background: #161616;}

/* MODAL / POPUP CUSTOMIZADOS */
.overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index: 200; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.popup-config { background: var(--card); padding: 30px; border-radius: 15px; width: 350px; border: 1px solid var(--primary); text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.6); animation: scaleIn 0.3s ease-out; }
@keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

/* TOAST / NOTIFICAÇÃO RÁPIDA */
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #333; color: #fff; padding: 12px 24px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.8); font-size: 14px; opacity: 0; transition: transform 0.3s ease, opacity 0.3s ease; z-index: 9999; border-left: 4px solid var(--primary); pointer-events: none; }
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* TABELAS */
.tabela-container { width: 100%; overflow-x: auto; margin-top: 20px; background: var(--card); border-radius: 8px; padding: 15px; }
.tabela { width: 100%; border-collapse: collapse; text-align: left; }
.tabela th { color: var(--primary); padding: 12px; border-bottom: 1px solid #333; font-weight: 600; white-space: nowrap; }
.tabela td { padding: 12px; border-bottom: 1px solid #333; font-size: 14px; vertical-align: middle; white-space: nowrap; }
.action-btn { padding: 8px 12px; border-radius: 6px; cursor: pointer; border: none; margin-right: 5px; font-size: 13px; display: inline-flex; align-items: center; justify-content: center; transition: 0.2s;}
.action-btn:hover { filter: brightness(1.2); }
.edit-btn { background: #2196F3; color: white; }
.del-btn { background: #F44336; color: white; }

/* BADGES & UTILS */
.badge { padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; border: none; outline: none; cursor:pointer; min-width: max-content; white-space: nowrap; }
.andamento { background: #FFA500; color: #000; }
.finalizado { background: #4CAF50; color: #fff; }
.cancelado { background: #F44336; color: #fff; }

.status-lead { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; border: none; outline: none; cursor: pointer; text-align: center; min-width: max-content; }
.lead-potencial { background: #2196F3; color: #fff; }
.lead-quente { background: #F44336; color: #fff; }
.lead-morno { background: #FF9800; color: #fff; }
.lead-frio { background: #9E9E9E; color: #fff; }

.config-icon { font-size: 20px; cursor: pointer; color: var(--primary); transition: 0.5s; }
.config-icon:hover { transform: rotate(90deg); }
.admin-badge { background: #FFD600; color: #000; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-left: 10px; display: none;}
.status-select { padding: 5px; border-radius: 5px; font-size: 12px; font-weight: bold; border: none; cursor: pointer;}
.dashboard-chart-container { background: var(--card); border-radius: 12px; padding: 20px; margin-top: 20px; border: 1px solid #333; height: 350px;}

.input-inline { background: transparent; border: 1px solid transparent; color: #fff; border-bottom: 1px solid #555; border-radius: 0; padding: 5px; text-align: center; width: 60px; font-size: 13px; }
.input-inline:focus { border-bottom: 1px solid var(--primary); }

/* AJUSTES MOBILE CIRÚRGICOS */
.btn-menu-mobile { display: none; font-size: 24px; color: var(--primary); cursor: pointer; margin-right: 15px; }
.sidebar-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); z-index: 40; backdrop-filter: blur(2px);}

@media (max-width: 768px) {
    body { overflow-y: auto; }
    .btn-menu-mobile { display: inline-block; }
    .container { flex-direction: column; overflow-y: auto !important; }
    .sidebar { position: fixed; left: -260px; top: 0; height: 100%; z-index: 50; transition: left 0.3s ease; box-shadow: 2px 0 15px rgba(0,0,0,0.8); width: 250px; }
    .sidebar.active { left: 0; }
    .submenu { width: 100%; border-right: none; border-bottom: 1px solid #333; height: auto !important; max-height: none !important; overflow: visible !important; }
    .main { width: 100%; flex: auto; height: auto; padding: 15px; overflow: visible !important; }
    .topbar { padding: 0 15px; }
    .dashboard-chart-container { height: 300px; padding: 10px; }
}

/* POPUP DESCRIÇÃO DE VENDAS */
.popup-descricao { position: absolute; display: none; background: #2A2A2A; border: 1px solid var(--primary); padding: 15px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.8); z-index: 300; max-width: 320px; color: #ccc; font-size: 13px; line-height: 1.5; animation: fadeInDesc 0.2s ease-out; }
@keyframes fadeInDesc { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

/* CALENDÁRIO & AGENDA */
.calendar-container { background: var(--card); border-radius: 12px; padding: 15px; margin-top: 20px; border: 1px solid #333; }
.calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
.calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
.day-name { font-weight: bold; color: var(--primary); font-size: 12px; padding: 5px 0; }
.day-cell { background: #2A2A2A; border-radius: 6px; padding: 10px 5px; font-size: 14px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; min-height: 45px; display: flex; align-items: center; justify-content: center; position: relative;}
.day-cell:hover { background: #333; border-color: var(--primary); }
.day-empty { background: transparent; cursor: default; }
.day-has-event { border-color: var(--primary); color: var(--primary); font-weight: bold; }
.day-has-event::after { content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); width: 6px; height: 6px; background: var(--primary); border-radius: 50%; }

.agenda-popup { background: var(--card); padding: 25px; border-radius: 12px; width: 350px; border: 1px solid var(--primary); display: flex; flex-direction: column; box-shadow: 0 10px 40px rgba(0,0,0,0.8); max-height: 80vh; }
.agenda-popup h3 { color: var(--primary); margin-bottom: 15px; text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px;}
.agenda-item { background: #2A2A2A; padding: 15px; border-radius: 8px; margin-bottom: 10px; font-size: 13px; border-left: 3px solid var(--primary); }
.agenda-item strong { color: #fff; display: block; font-size: 14px; margin-bottom: 3px;}
.agenda-item-actions { margin-top: 10px; text-align: right; }
.agenda-scroll { overflow-y: auto; flex: 1; padding-right: 5px; }

</style>
</head>

<body>

<div id="toast" class="toast">Nenhum agendamento nessa data.</div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div id="popupDescricao" class="popup-descricao"></div>

<div class="overlay" id="customAlertOverlay" style="z-index: 600;">
    <div class="popup-config" id="customAlertBox">
        <div id="customAlertIcon" style="font-size: 45px; margin-bottom: 15px;"></div>
        <h3 id="customAlertTitle"></h3>
        <p id="customAlertMsg" style="margin: 15px 0; font-size: 14px; color: #ccc; line-height: 1.5;"></p>
        <div id="customAlertButtons" style="display:flex; gap:10px; justify-content:center; margin-top: 20px;"></div>
    </div>
</div>

<div class="overlay" id="agendaOverlay" style="z-index: 400;" onclick="if(event.target.id === 'agendaOverlay') fecharAgendaPopup()">
    <div class="agenda-popup" id="agendaBox">
        <h3>Agendamentos: <span id="agendaPopupData" style="color:#fff;"></span></h3>
        <div class="agenda-scroll" id="agendaPopupContent"></div>
        <button class="btn btn-red" onclick="fecharAgendaPopup()" style="margin-top: 15px;">Fechar</button>
    </div>
</div>

<div id="welcomeOverlay">
    <div class="welcome-text">Bem vindo(a) a <span>EXCEL</span>LENT GESTÃO</div>
    <div class="loader-line"></div>
</div>

<div class="login" id="loginScreen">
    <div class="card">
        <div style="text-align: center; margin-bottom: 25px;">
            <i class="fa-solid fa-chart-pie" style="font-size: 40px; color: var(--primary); margin-bottom: 10px;"></i>
            <h2>Acesso Restrito</h2>
        </div>
        <input id="user" placeholder="Usuário">
        <input id="pass" type="password" placeholder="Senha">
        <button class="btn" onclick="login()">Entrar</button>
        <div style="display:flex; justify-content: space-between; margin-top: 10px;">
            <button class="btn" style="background: transparent; color: #aaa; width:48%; padding:8px; font-size:12px;" onclick="abrirCadastro()">Criar conta</button>
            <button class="btn" style="background: transparent; color: #aaa; width:48%; padding:8px; font-size:12px;" onclick="abrirMudarSenha()">Mudar Senha</button>
        </div>
    </div>
</div>

<div class="login" id="cadastroScreen" style="display:none">
    <div class="card">
        <h2>Cadastro</h2>
        <input id="novoUser" placeholder="Novo Usuário">
        <input id="novaSenha" type="password" placeholder="Senha">
        
        <select id="empresaSelect" onchange="verificarNovaEmpresa()">
            <option value="">Selecione a Empresa...</option>
            <option value="NOVA_EMPRESA">+ Adicionar Nova Empresa</option>
        </select>
        <input id="empresa" placeholder="Nome da Nova Empresa" style="display:none">
        
        <button class="btn" onclick="cadastrar()">Solicitar Acesso</button>
        <button class="btn btn-dark" onclick="voltarLogin()">Voltar</button>
    </div>
</div>

<div class="login" id="mudarSenhaScreen" style="display:none">
    <div class="card">
        <h2>Alterar Senha</h2>
        <input id="msUser" placeholder="Seu Usuário">
        <input id="msOld" type="password" placeholder="Senha Antiga">
        <input id="msNew" type="password" placeholder="Nova Senha">
        <button class="btn" onclick="mudarSenhaUser()">Atualizar Senha</button>
        <button class="btn btn-dark" onclick="voltarLogin()">Voltar</button>
    </div>
</div>

<div class="overlay" id="overlayConfig">
    <div class="popup-config">
        <h3 id="adminTitle">Autenticação Admin</h3>
        <p style="font-size: 12px; color: #aaa; margin-top: 5px; margin-bottom: 15px;">Insira a senha master da sua empresa para liberar edições.</p>
        <div id="adminForm">
            <input id="adminPass" type="password" placeholder="Senha Administrativa">
            <button class="btn" onclick="authAdmin()">Liberar Edição</button>
        </div>
        <button class="btn btn-red" onclick="fecharConfig()" style="margin-top: 10px;">Cancelar</button>
    </div>
</div>

<div class="app" id="app">
    <div class="topbar">
        <div style="display:flex; align-items: center;">
            <i class="fa-solid fa-bars btn-menu-mobile" onclick="toggleSidebar(event)"></i>
            <span style="font-weight: 600; letter-spacing: 1px;">EXCELLENT <span id="adminTag" class="admin-badge">MODO EDIÇÃO / ADMIN</span></span>
        </div>
        <i class="fa-solid fa-gear config-icon" onclick="abrirConfig()" title="Configurações / Liberação"></i>
    </div>
    
    <div class="container">
        <div class="sidebar">
            <div class="logo-sidebar">MENU</div>
            <div class="menu" style="display: flex; flex-direction: column; height: 100%;">
                <button onclick="mostrar('dashboard')"><i class="fa-solid fa-chart-line"></i> Dashboard</button>
                <button onclick="mostrar('agenda')"><i class="fa-solid fa-calendar-days"></i> Agenda</button>
                <button onclick="mostrar('leads')"><i class="fa-solid fa-filter"></i> Leads</button>
                <button onclick="mostrar('clientes')"><i class="fa-solid fa-users"></i> Clientes</button>
                <button onclick="mostrar('vendas')"><i class="fa-solid fa-cart-shopping"></i> Vendas</button>
                <button onclick="mostrar('processos')"><i class="fa-solid fa-tasks"></i> Processos</button>
                <button onclick="mostrar('credito')"><i class="fa-solid fa-hand-holding-dollar"></i> Crédito</button>
                
                <button id="btnFinanceiro" onclick="mostrar('financeiro')" style="display:none; border: 1px solid var(--primary);"><i class="fa-solid fa-money-bill-wave"></i> Financeiro</button>

                <button id="btnUsuarios" onclick="mostrar('usuarios')" style="display:none; background: #000; color: #fff; font-weight:bold; margin-top: 15px;">
                    <i class="fa-solid fa-user-shield" style="color:var(--primary)"></i> Desenvolvedor
                </button>

                <button onclick="localStorage.removeItem('excelUserSession'); location.reload()" class="btn-sair"><i class="fa-solid fa-door-open"></i> Sair</button>
            </div>
        </div>
        <div class="submenu" id="submenu"></div>
        <div class="main" id="conteudo"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, get, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC7vXTO8JQxBEu5ejxD4MNOscfbfgxgmp0",
        authDomain: "excellentgestao-e3136.firebaseapp.com",
        databaseURL: "https://excellentgestao-e3136-default-rtdb.firebaseio.com",
        projectId: "excellentgestao-e3136",
        storageBucket: "excellentgestao-e3136.firebasestorage.app",
        messagingSenderId: "544280332279",
        appId: "1:544280332279:web:9e5feeb04ad6490b8490f2"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const db = getDatabase(firebaseApp);

    let usuarios = {};
    let empresasConfigs = {};
    let dadosGlobal = { leads: [], clientes: [], vendas: [], agenda: [], financeiro: [] };
    let chave = ''; 
    let isAdminMode = false;
    let usuarioLogado = ''; 
    let userRole = 'comum'; 
    let telaAtual = 'dashboard';
    let chartInstance = null;
    window.finChartInstances = []; // Gráficos do financeiro
    
    let editLeadIndex = -1;
    let editClienteIndex = -1;
    let editVendaIndex = -1;
    let editProcessoIndex = -1;
    let editAgendaIndex = -1;
    let editFinIndex = -1;

    // Variáveis Globais (Filtros e Calendário)
    window.dashMesAtual = 'ALL';
    window.dashAnoAtual = new Date().getFullYear().toString();
    window.calMesAtual = new Date().getMonth();
    window.calAnoAtual = new Date().getFullYear();

    // --- CONTROLE DE SESSÃO E INATIVIDADE ---
    let inactivityTimer;
    window.resetInactivity = () => {
        clearTimeout(inactivityTimer);
        inactivityTimer = setTimeout(() => {
            localStorage.removeItem('excelUserSession');
            location.reload();
        }, 10 * 60 * 1000); // 10 minutos de inatividade = desloga
    };

    window.onload = () => {
        document.body.addEventListener('mousemove', window.resetInactivity);
        document.body.addEventListener('keydown', window.resetInactivity);
        document.body.addEventListener('click', window.resetInactivity);
        window.resetInactivity();

        let session = localStorage.getItem('excelUserSession');
        if(session) {
            let s = JSON.parse(session);
            usuarioLogado = s.usuarioLogado;
            chave = s.chave;
            userRole = s.userRole || 'comum';
            if(usuarioLogado === 'DESENVOLVEDOR') {
                document.getElementById('btnUsuarios').style.display = 'block';
                chave = 'admin_desenvolvedor';
            }
            iniciarApp();
        }
    };

    // --- LÓGICA DO MENU MOBILE ---
    window.toggleSidebar = (e) => {
        if(e) e.stopPropagation();
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        sidebar.classList.toggle('active');
        overlay.style.display = sidebar.classList.contains('active') ? 'block' : 'none';
    };

    // --- LÓGICA DO POPUP DE DESCRIÇÃO ---
    window.showDesc = (e, tipoColecao, idx) => {
        let target = e.target.tagName.toLowerCase();
        if(['button', 'i', 'a', 'select'].includes(target)) return;

        let obj = dadosGlobal[tipoColecao][idx];
        if(!obj) return;
        
        let txt = obj.descricao || 'Nenhuma descrição registrada.';
        txt = txt.replace(/\n/g, '<br>');

        const popup = document.getElementById('popupDescricao');
        popup.innerHTML = `<strong style="color:var(--primary); display:block; margin-bottom:8px;">Descrição:</strong>${txt}`;
        popup.style.display = 'block';

        let x = e.pageX + 15;
        let y = e.pageY + 15;
        if(x + 340 > window.innerWidth) x = window.innerWidth - 340; 
        
        popup.style.left = x + 'px';
        popup.style.top = y + 'px';
    };

    document.addEventListener('click', (e) => {
        if(!e.target.closest('.tabela-container')) {
            document.querySelectorAll('.obs-row').forEach(r => r.style.display = 'none');
        }
        const popup = document.getElementById('popupDescricao');
        if (popup && popup.style.display === 'block' && !e.target.closest('tr') && !e.target.closest('.popup-descricao')) {
            popup.style.display = 'none';
        }
    });

    // --- SISTEMA DE ALERTAS CUSTOMIZADOS ---
    window.uiAlerta = (msg, tipo = 'aviso') => {
        const overlay = document.getElementById('customAlertOverlay');
        const box = document.getElementById('customAlertBox');
        const title = document.getElementById('customAlertTitle');
        const icon = document.getElementById('customAlertIcon');
        const p = document.getElementById('customAlertMsg');
        const btns = document.getElementById('customAlertButtons');

        let cor = '#FFD600'; let icone = 'fa-triangle-exclamation'; let titulo = 'Atenção'; let txtColor = '#000';
        if(tipo === 'erro') { cor = '#F44336'; icone = 'fa-circle-xmark'; titulo = 'Erro'; txtColor = '#fff'; }
        if(tipo === 'sucesso') { cor = '#4CAF50'; icone = 'fa-circle-check'; titulo = 'Sucesso'; txtColor = '#fff'; }
        if(tipo === 'bloqueio') { cor = '#F44336'; icone = 'fa-lock'; titulo = 'Acesso Negado'; txtColor = '#fff'; }

        icon.innerHTML = `<i class="fa-solid ${icone}" style="color: ${cor}"></i>`;
        title.style.color = cor;
        title.innerText = titulo;
        p.innerText = msg;
        box.style.borderColor = cor;

        btns.innerHTML = `<button class="btn" style="background:${cor}; color:${txtColor};" onclick="document.getElementById('customAlertOverlay').style.display='none'">OK</button>`;
        overlay.style.display = 'flex';
    };

    window.uiConfirmar = (msg, callback) => {
        const overlay = document.getElementById('customAlertOverlay');
        const title = document.getElementById('customAlertTitle');
        const icon = document.getElementById('customAlertIcon');
        const p = document.getElementById('customAlertMsg');
        const btns = document.getElementById('customAlertButtons');

        icon.innerHTML = `<i class="fa-solid fa-circle-question" style="color: #2196F3"></i>`;
        title.style.color = '#2196F3';
        title.innerText = 'Confirmação';
        p.innerText = msg;
        document.getElementById('customAlertBox').style.borderColor = '#2196F3';

        btns.innerHTML = `
            <button class="btn btn-red" style="width: 100px;" onclick="document.getElementById('customAlertOverlay').style.display='none'">Cancelar</button>
            <button class="btn" style="width: 100px; background: #2196F3; color: white;" id="btnConfirmaAcao">Sim</button>
        `;
        
        document.getElementById('btnConfirmaAcao').onclick = () => {

            document.getElementById('btnUsuarios').style.display = 'none';

    function conectarDados() {
        if(chave === 'admin_desenvolvedor') {
            dadosGlobal = { leads: [], clientes: [], vendas: [], agenda: [], financeiro: [] };
            mostrar('usuarios'); 
            return;
        }
        onValue(ref(db, 'dados/' + chave), (snapshot) => {
            dadosGlobal = snapshot.val() || { leads: [], clientes: [], vendas: [], agenda: [], financeiro: [] };
            if(!dadosGlobal.leads) dadosGlobal.leads = [];
            if(!dadosGlobal.clientes) dadosGlobal.clientes = [];
            if(!dadosGlobal.vendas) dadosGlobal.vendas = [];
            if(!dadosGlobal.agenda) dadosGlobal.agenda = [];
            if(!dadosGlobal.financeiro) dadosGlobal.financeiro = [];
            
            let modificado = false;
            if(dadosGlobal.processos && dadosGlobal.processos.length > 0) {
                dadosGlobal.processos.forEach(p => {
                    let jaExiste = dadosGlobal.vendas.find(v => v.cliente === p.cliente && v.dataVenda === p.dataVenda && v.valor === p.valor);
                    if(jaExiste) Object.assign(jaExiste, p);
                    else dadosGlobal.vendas.push(p);
                });
                dadosGlobal.processos = [];
                modificado = true;
            }
            if(dadosGlobal.finalizados && dadosGlobal.finalizados.length > 0) {
                dadosGlobal.finalizados.forEach(f => {
                    f.statusProcesso = 'Finalizado';
                    let jaExiste = dadosGlobal.vendas.find(v => v.cliente === f.cliente && v.dataVenda === f.dataVenda && v.valor === f.valor);
                    if(jaExiste) Object.assign(jaExiste, f);
                    else dadosGlobal.vendas.push(f);
                });
                dadosGlobal.finalizados = [];
                modificado = true;
            }
            if(modificado) set(ref(db, 'dados/' + chave), dadosGlobal);

            mostrar(telaAtual);
        });
    }

    function checkTimeConflict(dataAgenda, horaAgenda, excludeIndex = -1) {
        let [nH, nM] = horaAgenda.split(':').map(Number);
        let novoMinutos = nH * 60 + nM;

        for (let i = 0; i < dadosGlobal.agenda.length; i++) {
            if (i === excludeIndex) continue;
            let a = dadosGlobal.agenda[i];
            if (a.data === dataAgenda) {
                let [eH, eM] = a.hora.split(':').map(Number);
                let existMinutos = eH * 60 + eM;
                if (Math.abs(novoMinutos - existMinutos) < 120) return true; 
            }
        }
        return false;
    }

        let tel = document.getElementById('agendaTel').value;
        let desc = document.getElementById('agendaDesc').value;

        if(!data || !hora || !cli) return uiAlerta("Data, Hora e Cliente são obrigatórios.", "aviso");

        if(checkTimeConflict(data, hora, editAgendaIndex)) {
            return uiAlerta("Conflito de horário! Já existe um agendamento com menos de 2 horas de diferença para este dia.", "erro");
        }

        let obj = { data, hora, cliente: cli, empresa: emp, telefone: tel, descricao: desc, usuarioCadastrou: usuarioLogado };

        if(editAgendaIndex > -1) {
            dadosGlobal.agenda[editAgendaIndex] = obj;
            editAgendaIndex = -1;

            dadosGlobal.agenda.push(obj);

    window.mudarMesCal = (diff) => {
        window.calMesAtual += diff;
        if(window.calMesAtual > 11) { window.calMesAtual = 0; window.calAnoAtual++; }
        if(window.calMesAtual < 0) { window.calMesAtual = 11; window.calAnoAtual--; }

    };

    window.renderCalendar = () => {
        let root = document.getElementById('calendarRoot');
        if(!root) return;

        const mesesStr = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
        let diasNoMes = new Date(window.calAnoAtual, window.calMesAtual + 1, 0).getDate();
        let primeiroDia = new Date(window.calAnoAtual, window.calMesAtual, 1).getDay();

        let mesStrFormato = (window.calMesAtual + 1).toString().padStart(2, '0');
        let prefixoData = `${window.calAnoAtual}-${mesStrFormato}-`;

        let eventosMes = {};
        (dadosGlobal.agenda || []).forEach((a, idx) => {
            if(a.data.startsWith(prefixoData)) {
                let dia = parseInt(a.data.split('-')[2]);
                if(!eventosMes[dia]) eventosMes[dia] = [];
                eventosMes[dia].push({...a, originalIdx: idx});
            }
        });

        let gridHtml = '';
        for(let i=0; i<primeiroDia; i++) gridHtml += `<div class="day-cell day-empty"></div>`;
        for(let d=1; d<=diasNoMes; d++) {
            let temEvento = eventosMes[d] ? 'day-has-event' : '';
            gridHtml += `<div class="day-cell ${temEvento}" onclick="window.abrirDiaAgenda(${d})">${d}</div>`;
        }

        root.innerHTML = `
            <div class="calendar-container">
                <div class="calendar-header">
                    <button class="action-btn edit-btn" onclick="window.mudarMesCal(-1)" style="padding: 10px 15px;"><i class="fa-solid fa-chevron-left"></i></button>
                    <strong style="font-size:18px; color:var(--primary);">${mesesStr[window.calMesAtual]} ${window.calAnoAtual}</strong>
                    <button class="action-btn edit-btn" onclick="window.mudarMesCal(1)" style="padding: 10px 15px;"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
                <div class="calendar-grid">
                    <div class="day-name">D</div><div class="day-name">S</div><div class="day-name">T</div>
                    <div class="day-name">Q</div><div class="day-name">Q</div><div class="day-name">S</div><div class="day-name">S</div>
                    ${gridHtml}
                </div>
            </div>
        `;
    };

    window.abrirDiaAgenda = (dia) => {
        let mesStr = (window.calMesAtual + 1).toString().padStart(2, '0');
        let diaStr = dia.toString().padStart(2, '0');
        let dataBuscada = `${window.calAnoAtual}-${mesStr}-${diaStr}`;
        
        let eventos = (dadosGlobal.agenda || []).map((a, idx) => ({...a, originalIdx: idx})).filter(a => a.data === dataBuscada);
        eventos.sort((a,b) => a.hora.localeCompare(b.hora));

        if(eventos.length === 0) {
            let toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
            return; 
        }

        let html = eventos.map(e => {
            let numLimpo = e.telefone ? e.telefone.replace(/\D/g, '') : '';
            return `
            <div class="agenda-item">
                <strong><i class="fa-regular fa-clock" style="color:var(--primary)"></i> ${e.hora} - ${e.cliente}</strong>
                <span style="color:#aaa; font-size:12px;">Empresa: ${e.empresa || '-'} | Tel: ${e.telefone || '-'}</span>
                ${e.telefone ? `<a href="https://wa.me/55${numLimpo}" target="_blank" style="color:#25D366; margin-left:10px; font-size:14px;"><i class="fa-brands fa-whatsapp"></i></a>` : ''}
                ${e.descricao ? `<p style="margin-top:8px; color:#ccc; border-top: 1px dashed #444; padding-top: 5px;">${e.descricao}</p>` : ''}
                ${e.usuarioCadastrou ? `<span style="display:block; font-size:11px; color:#888; margin-top:5px;"><i class="fa-solid fa-user-pen"></i> Agendado por: @${e.usuarioCadastrou}</span>` : ''}
                ${isAdminMode ? `
                <div class="agenda-item-actions">
                    <button class="action-btn edit-btn" onclick="window.editarAgenda(${e.originalIdx})"><i class="fa-solid fa-pen"></i></button>
                    <button class="action-btn del-btn" onclick="window.fecharAgendaPopup(); window.excluirGenerico('agenda', ${e.originalIdx});"><i class="fa-solid fa-trash"></i></button>
                </div>` : ''}
            </div>
        `}).join('');

        document.getElementById('agendaPopupData').innerText = `${diaStr}/${mesStr}/${window.calAnoAtual}`;
        document.getElementById('agendaPopupContent').innerHTML = html;
        document.getElementById('agendaOverlay').style.display = 'flex';
    };

    // --- ABA FINANCEIRO (LÓGICA CIRÚRGICA) ---
    window.verificarStatusFin = () => {
        let st = document.getElementById('fStatus').value;

        let obj = {
            data: document.getElementById('fData').value,
            tipo: document.getElementById('fTipo').value,
            categoria: document.getElementById('fCategoria').value,
            descricao: document.getElementById('fDesc').value.trim(),
            previsto: document.getElementById('fPrevisto').value,
            status: document.getElementById('fStatus').value,
            pago: document.getElementById('fPago')?.value || '',
            dataPaga: document.getElementById('fDataPaga')?.value || ''
        };

        if(!obj.data || !obj.descricao) return uiAlerta("Data e Descrição são obrigatórios.", "aviso");

        if(editFinIndex > -1) {
            dadosGlobal.financeiro[editFinIndex] = obj;
            editFinIndex = -1;
            uiAlerta("Registro financeiro atualizado!", "sucesso");
        } else {
            dadosGlobal.financeiro.push(obj);
            uiAlerta("Registro financeiro salvo com sucesso!", "sucesso");

    // --- CHART JS (POWER BI STYLE) ---
    window.renderDashboardChart = (todasAsVendas) => {
        const ctx = document.getElementById('vendasChart');
        if(!ctx) return;
        
        if(chartInstance) chartInstance.destroy();

        let faturamentoPorData = {};
        let canceladosPorData = {};

        todasAsVendas.forEach(v => {
            let data = v.dataVenda || 'Sem Data';
            let valorNum = parseFloat(v.valor.replace(/\D/g, '')) / 100 || 0;
            
            if(v.statusProcesso === 'Cancelado') {
                if(!canceladosPorData[data]) canceladosPorData[data] = 0;
                canceladosPorData[data] += valorNum;
            } else {
                if(!faturamentoPorData[data]) faturamentoPorData[data] = 0;
                faturamentoPorData[data] += valorNum;
            }
        });

        let datasUnicas = [...new Set([...Object.keys(faturamentoPorData), ...Object.keys(canceladosPorData)])].sort();
        
        let valoresFat = datasUnicas.map(d => faturamentoPorData[d] || 0);
        let valoresCanc = datasUnicas.map(d => canceladosPorData[d] || 0);

        let labelsFormatadas = datasUnicas.map(d => {
            if(d === 'Sem Data') return d;
            let parts = d.split('-');
            if(parts.length === 3) return `${parts[2]}/${parts[1]}`;
            return d;
        });

        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labelsFormatadas,
                datasets: [
                    { label: 'Faturamento Bruto', data: valoresFat, borderColor: '#FFD600', backgroundColor: 'rgba(255, 214, 0, 0.15)', borderWidth: 3, pointBackgroundColor: '#FFD600', fill: true, tension: 0.4 },
                    { label: 'Cancelamentos', data: valoresCanc, borderColor: '#FFFFFF', backgroundColor: 'rgba(255, 255, 255, 0)', borderWidth: 2, borderDash: [5, 5], pointBackgroundColor: '#FFFFFF', fill: false, tension: 0.4 }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false, color: '#aaa',
                plugins: {
                    legend: { labels: { color: '#fff', font: { family: 'Poppins' } } },
                    tooltip: { backgroundColor: '#000', titleFont: { family: 'Poppins' }, bodyFont: { family: 'Poppins' }, callbacks: { label: function(context) { return ' R$ ' + context.parsed.y.toLocaleString('pt-BR', {minimumFractionDigits: 2}); } } }
                },
                scales: {
                    x: { grid: { color: '#333' }, ticks: { color: '#aaa', font: { family: 'Poppins' } } },
                    y: { grid: { color: '#333' }, ticks: { color: '#aaa', font: { family: 'Poppins' }, callback: function(value) { return 'R$ ' + value.toLocaleString('pt-BR'); } }, beginAtZero: true }
                }
            }
        });
    }

    // Função Exclusiva Admin (Gráficos do Financeiro)

        window.finChartInstances = [];
        
        let gastos = financeiroFiltrado.filter(f => f.tipo === 'Saida');
        
        // 1. Chart: Previstos x Realizados (Line)

        gastos.forEach(g => {
            let d = g.data || 'Sem Data';
            if(!datasMap[d]) datasMap[d] = { prev: 0, real: 0 };
            datasMap[d].prev += parseFloat((g.previsto||'0').replace(/\D/g, ''))/100 || 0;
            if(g.status === 'Pago') datasMap[d].real += parseFloat((g.pago||'0').replace(/\D/g, ''))/100 || 0;
        });
        let datasOrd = Object.keys(datasMap).sort();
        let prevArr = datasOrd.map(d => datasMap[d].prev);
        let realArr = datasOrd.map(d => datasMap[d].real);
        let labelsOrd = datasOrd.map(d => d === 'Sem Data' ? d : d.split('-').reverse().slice(0,2).join('/'));

        const ctxLine = document.getElementById('chartFinLine');
        if(ctxLine) {
            window.finChartInstances.push(new Chart(ctxLine, {
                type: 'line',
                data: {
                    labels: labelsOrd,
                    datasets: [
                        { label: 'Gastos Previstos', data: prevArr, borderColor: '#FFFFFF', backgroundColor: 'transparent', borderWidth: 2, borderDash: [5, 5] },
                        { label: 'Gastos Realizados', data: realArr, borderColor: '#FFD600', backgroundColor: 'rgba(255, 214, 0, 0.15)', borderWidth: 3, fill: true }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#fff', font: {family:'Poppins'} } }, title: {display:true, text:'Gastos: Previstos x Realizados', color:'#FFD600', font: {family:'Poppins', size: 14}} }, scales: { x: { grid: {color:'#333'}, ticks: {color:'#aaa'} }, y: { grid: {color:'#333'}, ticks: {color:'#aaa', callback: function(value) { return 'R$ ' + value.toLocaleString('pt-BR'); }} } } }
            }));
        }

        // 2. Chart: Fixos x Variáveis (Pie/Doughnut) - Considera apenas os Pagos
        let gastosPagos = gastos.filter(g => g.status === 'Pago');
        let sumFixo = 0; let sumVar = 0;
        gastosPagos.forEach(g => {
            let v = parseFloat((g.pago||'0').replace(/\D/g, ''))/100 || 0;
            if(g.categoria === 'Fixo') sumFixo += v; else sumVar += v;
        });
        
        const ctxPie = document.getElementById('chartFinPie');
        if(ctxPie) {
            window.finChartInstances.push(new Chart(ctxPie, {
                type: 'doughnut',
                data: {
                    labels: ['Fixos', 'Variáveis'],
                    datasets: [{ data: [sumFixo, sumVar], backgroundColor: ['#FFD600', '#FFFFFF'], borderWidth: 0 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#fff', font: {family:'Poppins'} } }, title: {display:true, text:'Proporção Realizada: Fixos x Variáveis', color:'#FFD600', font: {family:'Poppins', size: 14}} } }
            }));
        }

        // 3. Chart: Ranking Maiores Gastos (Bar) - Considera apenas os Pagos
        let descMap = {};
        gastosPagos.forEach(g => {
            if(!descMap[g.descricao]) descMap[g.descricao] = 0;
            descMap[g.descricao] += parseFloat((g.pago||'0').replace(/\D/g, ''))/100 || 0;
        });
        let descArr = Object.keys(descMap).map(k => ({desc: k, val: descMap[k]}));
        descArr.sort((a,b) => b.val - a.val); // maior pro menor
        let top10 = descArr.slice(0, 10);

        const ctxBar = document.getElementById('chartFinBar');
        if(ctxBar) {
            window.finChartInstances.push(new Chart(ctxBar, {
                type: 'bar',
                data: {
                    labels: top10.map(x => x.desc),

        }

                    <div style="text-align:right;">
                        <span style="font-size:12px; color:#aaa;">Faturamento (No Filtro)</span><br>
                        <strong style="font-size:24px; color:var(--primary);">R$ ${faturamentoFiltrado.toLocaleString('pt-BR', {minimumFractionDigits:2})}</strong>
                        <br>
                        <span style="font-size:12px; color:#aaa;">Cancelamentos (Branco)</span><br>
                        <strong style="font-size:15px; color:#fff;">R$ ${cancelamentosFiltrado.toLocaleString('pt-BR', {minimumFractionDigits:2})}</strong>
                    </div>
                </div>
                <div style="text-align:right; margin-top:5px;">
                    <span style="font-size:11px; color:#666;">Total Geral de Tudo (Ativos): R$ ${faturamentoTotalGeral.toLocaleString('pt-BR', {minimumFractionDigits:2})}</span>
                </div>
                
                <div class="dashboard-chart-container">
                    <canvas id="vendasChart"></canvas>
                </div>
            `;
            setTimeout(() => window.renderDashboardChart(vendasFiltradas), 50);

            // -----------------------------------------------------------------
            // INJEÇÃO GRÁFICOS FINANCEIROS (APENAS PARA ADMINS NO DASHBOARD)
            // -----------------------------------------------------------------
            if(userRole === 'admin' || usuarioLogado === 'DESENVOLVEDOR') {
                let financFiltrado = (dadosGlobal.financeiro || []).filter(f => {
                    let anoF = f.data ? f.data.split('-')[0] : '';
                    let mesF = f.data ? f.data.split('-')[1] : '';
                    let passaMes = (window.dashMesAtual === 'ALL') || (mesF === window.dashMesAtual);
                    let passaAno = (window.dashAnoAtual === 'ALL') || (anoF === window.dashAnoAtual);
                    return passaMes && passaAno;
                });

                conteudo.innerHTML += `
                    <h3 style="margin-top:35px; border-bottom:1px solid #333; padding-bottom:10px;">Visão Financeira (Exclusivo Admin)</h3>
                    <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-top:20px;">
                        <div class="dashboard-chart-container" style="height:320px;"><canvas id="chartFinLine"></canvas></div>
                        <div class="dashboard-chart-container" style="height:320px;"><canvas id="chartFinPie"></canvas></div>
                    </div>
                    <div class="dashboard-chart-container" style="margin-top:20px; height: 350px;"><canvas id="chartFinBar"></canvas></div>
                `;
                setTimeout(() => window.renderDashboardFinanceiro(financFiltrado), 100);
            }
        }

        if(tela === 'credito') {
            let vCreditoTotal = (dadosGlobal.vendas || []).map((v, i) => ({...v, originalIdx: i, origem: 'vendas'})).filter(v => v.tipo === 'Crédito');

            let vCreditoFiltrado = vCreditoTotal.filter(v => {
                let dataRef = v.data || v.dataVenda || '';
                let anoVenda = dataRef ? dataRef.split('-')[0] : '';
                let mesVenda = dataRef ? dataRef.split('-')[1] : '';
                let passaMes = (window.dashMesAtual === 'ALL') || (mesVenda === window.dashMesAtual);
                let passaAno = (window.dashAnoAtual === 'ALL') || (anoVenda === window.dashAnoAtual);
                return passaMes && passaAno;
            });

            let somaCredito = 0;
            vCreditoFiltrado.forEach(v => { somaCredito += parseFloat((v.restante || v.valor).replace(/\D/g, '')) / 100 || 0; });

            submenu.innerHTML = `
                <h3>Créditos</h3>
                <p style="color:#aaa; font-size:13px;">Gestão de parcelamentos dinâmicos.</p>
                <div style="margin-top:20px; border-top: 1px solid #333; padding-top:15px; text-align:left;">
                    <h4 style="font-size:13px; margin-bottom:5px;">Filtros (Crédito)</h4>
                    <select onchange="window.setDashFiltro('mes', this.value)" style="margin-bottom:5px;">${optMeses}</select>
                    <select onchange="window.setDashFiltro('ano', this.value)">${optAnos}</select>
                    
                    <div style="margin-top:15px; color:#aaa; font-size:12px;">Quantidade Total (Filtro): <strong style="color:var(--text); font-size:15px;">${vCreditoFiltrado.length}</strong></div>
                    <div style="margin-top:5px; color:#aaa; font-size:12px;">Soma a Receber (Restante):<br> <strong style="color:var(--primary); font-size:18px;">R$ ${somaCredito.toLocaleString('pt-BR', {minimumFractionDigits:2})}</strong></div>
                </div>
            `;

            conteudo.innerHTML = `<h2>Controle de Parcelas</h2>
                <div class="tabela-container">
                    <table class="tabela">
                        <thead><tr><th>Fase Atual</th><th>Cliente</th><th>Total</th><th>Restante</th><th>Parcelas</th><th>Vencimento</th>${isAdminMode ? '<th style="text-align:right;">Ações</th>' : ''}</tr></thead>
                        <tbody>
                            ${vCreditoFiltrado.map(v => `<tr>
                                <td><span class="badge" style="background:#222; color:#aaa; font-weight:normal;">${v.statusProcesso.toUpperCase()}</span></td>
                                <td><strong>${v.cliente}</strong></td>
                                <td style="color:#aaa;">${v.valor}</td>
                                <td style="color:#F44336; font-weight:bold;">${v.restante}</td>
                                <td>${v.parcelas}x</td>
                                <td><span class="badge" style="background:#222; color:var(--primary);">${v.data ? v.data.split('-').reverse().join('/') : '-'}</span></td>
                                ${isAdminMode ? `
                                <td style="text-align:right;">
                                    <button class="action-btn edit-btn" onclick="mostrar('${v.origem}'); setTimeout(()=> window.editarVenda(${v.originalIdx}), 100)" title="Editar na aba Vendas"><i class="fa-solid fa-pen"></i></button>
                                    <button class="action-btn del-btn" onclick="window.excluirGenerico('vendas', ${v.originalIdx})" title="Excluir Registro"><i class="fa-solid fa-trash"></i></button>
                                </td>` : ''}
                            </tr>`).join('')}
                        </tbody>
                    </table>
                </div>`;
        }
    };

    // --- UTILITÁRIOS & CADASTRO E TELAS LOGIN ---
    window.autoCPF = () => {
        let c = dadosGlobal.clientes.find(x => x.nome === document.getElementById('clienteSel').value);
        document.getElementById('cpf').value = c ? c.doc : '';
    };

    window.verCredito = () => {
        let extra = document.getElementById('extra');
        if(document.getElementById('tipo').value === 'Crédito') {
            extra.innerHTML = `
                <input id="taxa" placeholder="Taxa/Juros (R$)" oninput="window.mascaraMoeda(this); window.calcularRestante()">
                <div style="display:flex; gap:10px;">
                    <input id="parcelas" placeholder="Qtd Parc." type="number" style="width:40%;">
                    <input id="data" type="date" style="width:60%;" title="Data do 1º Vencimento">
                </div>
                <input id="restante" placeholder="Resta Pagar" readonly style="background:#222; color:#F44336; font-weight:bold;">
                `;
        } else { extra.innerHTML = ''; }
    };

    window.mascaraDoc = (i) => {
        let v = i.value.replace(/\D/g, "");
        if(v.length <= 11) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4");
        else v = v.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, "$1.$2.$3/$4-$5");
        i.value = v;
    };

    window.mascaraMoeda = (i) => {
        let v = i.value.replace(/\D/g, '');
        v = (v/100).toFixed(2).replace(".", ",");
        i.value = "R$ " + v.replace(/(\d)(?=(\d{3})+(?!\d))/g, "$1.");
    };

    window.calcularRestante = () => {
        let val = parseFloat(document.getElementById('valor').value.replace(/\D/g, ''))/100 || 0;
        let ent = parseFloat(document.getElementById('entrada').value.replace(/\D/g, ''))/100 || 0;
        let tax = parseFloat(document.getElementById('taxa')?.value.replace(/\D/g, '') || 0)/100 || 0;
        let rest = (val - ent) + tax;
        if(document.getElementById('restante')) 
            document.getElementById('restante').value = "R$ " + rest.toLocaleString('pt-BR', {minimumFractionDigits: 2});
    };

    window.abrirCadastro = () => {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mudarSenhaScreen').style.display = 'none';
        document.getElementById('cadastroScreen').style.display = 'flex';
    };

    window.abrirMudarSenha = () => {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('cadastroScreen').style.display = 'none';
        document.getElementById('mudarSenhaScreen').style.display = 'flex';
    }

    window.voltarLogin = () => {
        document.getElementById('cadastroScreen').style.display = 'none';
        document.getElementById('mudarSenhaScreen').style.display = 'none';
        document.getElementById('loginScreen').style.display = 'flex';
        
        document.getElementById('novoUser').value = '';
        document.getElementById('novaSenha').value = '';
        document.getElementById('empresaSelect').value = '';
        document.getElementById('empresa').value = '';
        document.getElementById('empresa').style.display = 'none';
        
        document.getElementById('msUser').value = '';
        document.getElementById('msOld').value = '';
        document.getElementById('msNew').value = '';
    };

    window.verificarNovaEmpresa = () => {
        const sel = document.getElementById('empresaSelect').value;
        document.getElementById('empresa').style.display = sel === 'NOVA_EMPRESA' ? 'block' : 'none';
    };

    window.cadastrar = () => {
        const u = document.getElementById('novoUser').value.trim();
        const p = document.getElementById('novaSenha').value;
        const selEmpresa = document.getElementById('empresaSelect').value;
        let nomeEmpresa = selEmpresa;

        if (selEmpresa === 'NOVA_EMPRESA') {
            nomeEmpresa = document.getElementById('empresa').value.trim();
        }

        if(!u || !p || !nomeEmpresa) return uiAlerta("Preencha todos os campos corretamente para solicitar acesso.", "aviso");
        
        if(usuarios[u]) {
            return uiAlerta(`O usuário "${u}" já existe. Escolha outro identificador.`, "erro");
        }

        set(ref(db, 'usuarios/' + u), {
            senha: p,
            empresa: nomeEmpresa,
            statusAcesso: 'pendente' 
        }).then(() => {
            uiAlerta("Sua solicitação foi enviada! Aguarde a aprovação do Administrador.", "sucesso");
            voltarLogin(); 
        });
    };

</script>
</body>
</html>
