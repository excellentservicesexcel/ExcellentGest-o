<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excellent Gestão - Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root { --primary: #FFD600; --bg: #121212; --card: #1E1E1E; --input: #2A2A2A; --text: #fff; }
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{height:100vh;background:var(--bg);color:var(--text);overflow: hidden;}

/* ANIMAÇÃO DE BOAS-VINDAS */
#welcomeOverlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: var(--bg); display: none; justify-content: center;
    align-items: center; z-index: 1000; flex-direction: column;
}
.welcome-text { font-size: 2.5rem; font-weight: 600; opacity: 0; transform: translateY(20px); animation: fadeInUp 0.8s forwards; }
.welcome-text span { color: var(--primary); }
@keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
.loader-line { width: 200px; height: 3px; background: #333; margin-top: 20px; border-radius: 10px; overflow: hidden; }
.loader-line::after { content: ''; display: block; width: 100px; height: 100%; background: var(--primary); animation: loading 1.5s infinite linear; }
@keyframes loading { from { margin-left: -100px; } to { margin-left: 200px; } }

/* LOGIN */
.login{display:flex;justify-content:center;align-items:center;height:100vh}
.card{background:var(--card);padding:25px;border-radius:12px;width:320px;box-shadow: 0 10px 30px rgba(0,0,0,0.5)}
input,select{width:100%;padding:10px;margin-top:10px;background:var(--input);border:none;color:#fff;border-radius:6px;outline: none;}

.btn{margin-top:15px;padding:12px;width:100%;background:var(--primary);color:#000;border:none;border-radius:8px;cursor:pointer;font-weight:bold;transition: 0.3s;}
.btn:hover{filter: brightness(1.2); transform: scale(1.02);}
.btn-red { background: #F44336; color: white; }

/* APP LAYOUT */
.app{display:none;height:100vh;flex-direction: column;}
.topbar { height: 60px; background: var(--card); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; border-bottom: 1px solid #333; }
.container{display:flex;flex: 1; overflow: hidden;}

/* SIDEBAR */
.sidebar{ width:220px; background:var(--primary); padding:20px; display: flex; flex-direction: column; }
.logo-sidebar{font-size:20px;font-weight:600;color:#000;margin-bottom:30px; text-align: center;}
.menu button{width:100%;padding:12px;margin-bottom:10px;background:#000;color:#fff;border:none;border-radius:8px;cursor:pointer; text-align: left; transition: 0.3s;}
.menu button i { margin-right: 10px; }
.menu button:hover{background:#fff;color:#000}

.submenu{ width:260px; background:var(--card); padding:20px; border-right:1px solid #333; overflow-y: auto;}
.main{flex:1;padding:30px;overflow-y:auto; background: #161616;}

/* MODAL / POPUP */
.overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 200; display: none; align-items: center; justify-content: center; }
.popup-config { background: var(--card); padding: 30px; border-radius: 15px; width: 350px; border: 1px solid var(--primary); }

/* TABELAS */
.tabela-container { width: 100%; overflow-x: auto; margin-top: 20px; background: var(--card); border-radius: 8px; padding: 15px; }
.tabela { width: 100%; border-collapse: collapse; text-align: left; }
.tabela th { color: var(--primary); padding: 12px; border-bottom: 1px solid #333; }
.tabela td { padding: 12px; border-bottom: 1px solid #444; font-size: 14px; }
.action-btn { padding: 5px 10px; border-radius: 5px; cursor: pointer; border: none; margin-right: 5px; font-size: 12px; }
.edit-btn { background: #2196F3; color: white; }
.del-btn { background: #F44336; color: white; }

/* BADGES */
.badge { padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; }
.andamento { background: #FFA500; color: #000; }
.finalizado { background: #4CAF50; color: #fff; }
.cancelado { background: #F44336; color: #fff; }

.config-icon { font-size: 20px; cursor: pointer; color: var(--primary); transition: 0.5s; }
.config-icon:hover { transform: rotate(90deg); }
.admin-badge { background: #FFD600; color: #000; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-left: 10px; display: none;}
</style>
</head>

<body>

<div id="welcomeOverlay">
    <div class="welcome-text">Bem vindo(a) a <span>EXCEL</span>LENT GESTÃO</div>
    <div class="loader-line"></div>
</div>

<div class="login" id="loginScreen">
    <div class="card">
        <h2 style="text-align: center; margin-bottom: 20px;">Acesso</h2>
        <input id="user" placeholder="Usuário">
        <input id="pass" type="password" placeholder="Senha">
        <button class="btn" onclick="login()">Entrar</button>
        <button class="btn" style="background: transparent; color: #aaa;" onclick="abrirCadastro()">Criar conta</button>
    </div>
</div>

<div class="login" id="cadastroScreen" style="display:none">
    <div class="card">
        <h2>Cadastro</h2>
        <input id="novoUser" placeholder="Usuário">
        <input id="novaSenha" type="password" placeholder="Senha">
        <input id="empresa" placeholder="Empresa">
        <input id="regiao" placeholder="Região">
        <button class="btn" onclick="cadastrar()">Solicitar Acesso</button>
        <button class="btn" style="background:#444; color:#fff" onclick="location.reload()">Voltar</button>
    </div>
</div>

<div class="overlay" id="overlayConfig">
    <div class="popup-config">
        <h3 id="adminTitle">Autenticação Admin</h3>
        <div id="adminForm">
            <input id="adminUser" placeholder="Usuário Admin">
            <input id="adminPass" type="password" placeholder="Senha">
            <button class="btn" onclick="authAdmin()">Liberar Edição</button>
        </div>
        <button class="btn btn-red" onclick="fecharConfig()">Fechar</button>
    </div>
</div>

<div class="app" id="app">
    <div class="topbar">
        <div style="display:flex; align-items: center;">
            <span style="font-weight: 600; letter-spacing: 1px;">EXCELLENT <span id="adminTag" class="admin-badge">MODO ADMIN</span></span>
        </div>
        <i class="fa-solid fa-gear config-icon" onclick="abrirConfig()"></i>
    </div>
    
    <div class="container">
        <div class="sidebar">
            <div class="logo-sidebar">MENU</div>
            <div class="menu">
                <button onclick="mostrar('dashboard')"><i class="fa-solid fa-chart-line"></i> Dashboard</button>
                <button onclick="mostrar('clientes')"><i class="fa-solid fa-users"></i> Clientes</button>
                <button onclick="mostrar('vendas')"><i class="fa-solid fa-cart-shopping"></i> Vendas</button>
                <button onclick="mostrar('credito')"><i class="fa-solid fa-hand-holding-dollar"></i> Crédito</button>
                <button onclick="location.reload()" style="margin-top:auto; background: rgba(255,255,255,0.1); color: #000;"><i class="fa-solid fa-door-open"></i> Sair</button>
            </div>
        </div>
        <div class="submenu" id="submenu"></div>
        <div class="main" id="conteudo"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, get, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC7vXTO8JQxBEu5ejxD4MNOscfbfgxgmp0",
        authDomain: "excellentgestao-e3136.firebaseapp.com",
        databaseURL: "https://excellentgestao-e3136-default-rtdb.firebaseio.com",
        projectId: "excellentgestao-e3136",
        storageBucket: "excellentgestao-e3136.firebasestorage.app",
        messagingSenderId: "544280332279",
        appId: "1:544280332279:web:9e5feeb04ad6490b8490f2"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const db = getDatabase(firebaseApp);

    let usuarios = {};
    let dadosGlobal = { clientes: [], vendas: [] };
    let chave = '';
    let isAdminMode = false;
    let editIndex = -1;

    onValue(ref(db, 'usuarios'), (snapshot) => { usuarios = snapshot.val() || {}; });

    // --- SISTEMA DE LOGIN ---
    window.login = () => {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;

        if((u === 'admin' && p === '123') || (usuarios[u] && usuarios[u].senha === p)){
            chave = u === 'admin' ? 'admin' : usuarios[u].empresa + '_' + usuarios[u].regiao;
            
            document.getElementById('loginScreen').style.display = 'none';
            const overlay = document.getElementById('welcomeOverlay');
            overlay.style.display = 'flex';
            
            setTimeout(() => {
                overlay.style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                conectarDados();
            }, 2500);
        } else { alert('Acesso negado'); }
    };

    function conectarDados() {
        onValue(ref(db, 'dados/' + chave), (snapshot) => {
            dadosGlobal = snapshot.val() || { clientes: [], vendas: [] };
            if(!dadosGlobal.clientes) dadosGlobal.clientes = [];
            if(!dadosGlobal.vendas) dadosGlobal.vendas = [];
            mostrar('dashboard');
        });
    }

    // --- CONFIGURAÇÕES & ADMIN ---
    window.abrirConfig = () => {
        if(isAdminMode) {
            isAdminMode = false;
            document.getElementById('adminTag').style.display = 'none';
            mostrar('clientes');
            return;
        }
        document.getElementById('overlayConfig').style.display = 'flex';
    };

    window.fecharConfig = () => { document.getElementById('overlayConfig').style.display = 'none'; };

    window.authAdmin = () => {
        const u = document.getElementById('adminUser').value;
        const p = document.getElementById('adminPass').value;
        if(u === 'admin' && p === '1709') {
            isAdminMode = true;
            document.getElementById('adminTag').style.display = 'inline-block';
            fecharConfig();
            mostrar('clientes');
            alert('Modo Administrador Ativado!');
        } else { alert('Admin Inválido'); }
    };

    // --- CLIENTES (CRUD) ---
    window.salvarCliente = () => {
        const n = document.getElementById('nome').value;
        const c = document.getElementById('cel').value;
        const d = document.getElementById('doc').value;
        if(!n) return alert("Nome é obrigatório");

        if(editIndex > -1) {
            dadosGlobal.clientes[editIndex] = {nome:n, cel:c, doc:d};
            editIndex = -1;
        } else {
            dadosGlobal.clientes.push({nome:n, cel:c, doc:d});
        }
        
        set(ref(db, 'dados/' + chave), dadosGlobal);
        mostrar('clientes');
    };

    window.editarCliente = (i) => {
        const cli = dadosGlobal.clientes[i];
        document.getElementById('nome').value = cli.nome;
        document.getElementById('cel').value = cli.cel;
        document.getElementById('doc').value = cli.doc;
        editIndex = i;
        document.querySelector('.submenu .btn').innerText = "Atualizar Cliente";
    };

    window.excluirCliente = (i) => {
        if(confirm("Deseja realmente excluir este cliente?")) {
            dadosGlobal.clientes.splice(i, 1);
            set(ref(db, 'dados/' + chave), dadosGlobal);
        }
    };

    // --- VENDAS ---
    window.salvarVenda = () => {
        const cli = document.getElementById('clienteSel').value;
        if(!cli) return alert("Selecione um cliente");

        let v = {
            cliente: cli,
            cpf: document.getElementById('cpf').value,
            valor: document.getElementById('valor').value,
            entrada: document.getElementById('entrada').value,
            tipo: document.getElementById('tipo').value,
            status: document.getElementById('status').value,
            etapa: document.getElementById('etapa').value,
            taxa: document.getElementById('taxa')?.value || '',
            parcelas: document.getElementById('parcelas')?.value || '',
            restante: document.getElementById('restante')?.value || '',
            data: document.getElementById('data')?.value || ''
        };

        dadosGlobal.vendas.push(v);
        set(ref(db, 'dados/' + chave), dadosGlobal);
        mostrar('vendas');
    };

    window.mudarStatusVenda = (index, novoStatus) => {
        dadosGlobal.vendas[index].status = novoStatus;
        set(ref(db, 'dados/' + chave), dadosGlobal);
    };

    // --- INTERFACE DINÂMICA ---
    window.mostrar = (tela) => {
        const submenu = document.getElementById('submenu');
        const conteudo = document.getElementById('conteudo');

        if(tela === 'clientes') {
            submenu.innerHTML = `
                <h3>Novo Cliente</h3>
                <input id="nome" placeholder="Nome Completo">
                <input id="cel" placeholder="WhatsApp">
                <input id="doc" placeholder="CPF/CNPJ" oninput="window.mascaraDoc(this)" maxlength="18">
                <button class="btn" onclick="salvarCliente()">Salvar Cliente</button>
            `;
            conteudo.innerHTML = `
                <h2>Gestão de Clientes</h2>
                <div class="tabela-container">
                    <table class="tabela">
                        <thead><tr><th>Nome</th><th>Contato</th><th>Documento</th>${isAdminMode ? '<th>Ações</th>' : ''}</tr></thead>
                        <tbody>
                            ${dadosGlobal.clientes.map((c, i) => `
                                <tr>
                                    <td>${c.nome}</td>
                                    <td>${c.cel}</td>
                                    <td>${c.doc}</td>
                                    ${isAdminMode ? `
                                    <td>
                                        <button class="action-btn edit-btn" onclick="editarCliente(${i})"><i class="fa-solid fa-pen"></i></button>
                                        <button class="action-btn del-btn" onclick="excluirCliente(${i})"><i class="fa-solid fa-trash"></i></button>
                                    </td>` : ''}
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>`;
        }

        if(tela === 'vendas') {
            let options = dadosGlobal.clientes.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('');
            submenu.innerHTML = `
                <h3>Lançar Venda</h3>
                <select id="clienteSel" onchange="window.autoCPF()">
                    <option value="">Selecionar Cliente</option>${options}
                </select>
                <input id="cpf" placeholder="CPF/CNPJ" readonly>
                <input id="valor" placeholder="Valor Total" oninput="window.mascaraMoeda(this); window.calcularRestante()">
                <input id="entrada" placeholder="Valor Entrada" oninput="window.mascaraMoeda(this); window.calcularRestante()">
                <select id="tipo" onchange="window.verCredito()">
                    <option value="Pix" selected>Pix</option>
                    <option value="Crédito">Crédito</option>
                    <option value="Débito">Débito</option>
                </select>
                <select id="status">
                    <option>Em andamento</option><option>Finalizado</option><option>Cancelado</option>
                </select>
                <select id="etapa">
                    <option>Ajuste</option><option>Desenvolvimento</option><option>Suporte</option>
                </select>
                <div id="extra"></div>
                <button class="btn" onclick="salvarVenda()">Confirmar Venda</button>
            `;
            conteudo.innerHTML = `<h2>Histórico de Vendas</h2>
                <div class="tabela-container">
                    <table class="tabela">
                        <thead><tr><th>Cliente</th><th>Valor</th><th>Pagamento</th><th>Status</th></tr></thead>
                        <tbody>
                            ${dadosGlobal.vendas.map((v, i) => {
                                let cls = v.status === 'Em andamento' ? 'andamento' : (v.status === 'Finalizado' ? 'finalizado' : 'cancelado');
                                return `<tr>
                                    <td>${v.cliente}</td>
                                    <td>${v.valor}</td>
                                    <td>${v.tipo}</td>
                                    <td>
                                        <select class="badge ${cls}" onchange="window.mudarStatusVenda(${i}, this.value)">
                                            <option value="Em andamento" ${v.status==='Em andamento'?'selected':''}>Em andamento</option>
                                            <option value="Finalizado" ${v.status==='Finalizado'?'selected':''}>Finalizado</option>
                                            <option value="Cancelado" ${v.status==='Cancelado'?'selected':''}>Cancelado</option>
                                        </select>
                                    </td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>`;
        }
        
        if(tela === 'dashboard') {
            submenu.innerHTML = '<h3>Resumo Geral</h3><p>Visão rápida dos seus números hoje.</p>';
            conteudo.innerHTML = `
                <h2>Dashboard</h2>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px;">
                    <div class="card" style="width: 100%; text-align: center;">
                        <h4 style="color: #FFD600">Clientes</h4>
                        <p style="font-size: 30px; font-weight: bold;">${dadosGlobal.clientes.length}</p>
                    </div>
                    <div class="card" style="width: 100%; text-align: center;">
                        <h4 style="color: #FFD600">Vendas</h4>
                        <p style="font-size: 30px; font-weight: bold;">${dadosGlobal.vendas.length}</p>
                    </div>
                </div>
            `;
        }

        if(tela === 'credito') {
            submenu.innerHTML = `<h3>Créditos</h3><p>Filtro de parcelamentos.</p>`;
            let vCredito = dadosGlobal.vendas.filter(v => v.tipo === 'Crédito');
            conteudo.innerHTML = `<h2>Controle de Parcelas</h2>
                <div class="tabela-container">
                    <table class="tabela">
                        <thead><tr><th>Cliente</th><th>Total</th><th>Restante</th><th>Parcelas</th><th>Vencimento</th></tr></thead>
                        <tbody>
                            ${vCredito.map(v => `<tr>
                                <td>${v.cliente}</td><td>${v.valor}</td><td>${v.restante}</td><td>${v.parcelas}x</td><td>${v.data}</td>
                            </tr>`).join('')}
                        </tbody>
                    </table>
                </div>`;
        }
    };

    // --- UTILITÁRIOS ---
    window.autoCPF = () => {
        let c = dadosGlobal.clientes.find(x => x.nome === document.getElementById('clienteSel').value);
        document.getElementById('cpf').value = c ? c.doc : '';
    };

    window.verCredito = () => {
        let extra = document.getElementById('extra');
        if(document.getElementById('tipo').value === 'Crédito') {
            extra.innerHTML = `
                <input id="taxa" placeholder="Taxa (R$)" oninput="window.mascaraMoeda(this); window.calcularRestante()">
                <input id="parcelas" placeholder="Qtd Parcelas">
                <input id="restante" placeholder="Resta Pagar" readonly>
                <input id="data" type="date">`;
        } else { extra.innerHTML = ''; }
    };

    window.mascaraDoc = (i) => {
        let v = i.value.replace(/\D/g, "");
        if(v.length <= 11) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4");
        else v = v.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, "$1.$2.$3/$4-$5");
        i.value = v;
    };

    window.mascaraMoeda = (i) => {
        let v = i.value.replace(/\D/g, '');
        v = (v/100).toFixed(2).replace(".", ",");
        i.value = "R$ " + v.replace(/(\d)(?=(\d{3})+(?!\d))/g, "$1.");
    };

    window.calcularRestante = () => {
        let val = parseFloat(document.getElementById('valor').value.replace(/\D/g, ''))/100 || 0;
        let ent = parseFloat(document.getElementById('entrada').value.replace(/\D/g, ''))/100 || 0;
        let tax = parseFloat(document.getElementById('taxa')?.value.replace(/\D/g, '') || 0)/100 || 0;
        let rest = (val - ent) + tax;
        if(document.getElementById('restante')) 
            document.getElementById('restante').value = "R$ " + rest.toLocaleString('pt-BR', {minimumFractionDigits: 2});
    };

    window.abrirCadastro = () => {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('cadastroScreen').style.display = 'flex';
    };

    window.cadastrar = () => {
        const u = document.getElementById('novoUser').value;
        const p = document.getElementById('novaSenha').value;
        if(!u || !p) return alert("Preencha os campos");
        set(ref(db, 'usuarios/' + u), {
            senha: p,
            empresa: document.getElementById('empresa').value,
            regiao: document.getElementById('regiao').value
        }).then(() => alert("Solicitação enviada!"));
    };

</script>
</body>
</html>
